<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login APASE WEB</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
      overflow:hidden;
    }

    .background-circle{
      position:absolute;
      border-radius:50%;
      filter:blur(100px);
      opacity:.5;
    }

    .circle1{
      width:300px;
      height:300px;
      background:#60a5fa;
      top:-100px;
      left:-100px;
    }

    .circle2{
      width:350px;
      height:350px;
      background:#2563eb;
      bottom:-120px;
      right:-120px;
    }

    .login-container{
      position:relative;
      width:380px;
      padding:40px;
      border-radius:25px;
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.2);
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
      color:white;
      z-index:2;
    }

    .logo{
      text-align:center;
      margin-bottom:25px;
    }

    .logo h1{
      font-size:32px;
      font-weight:700;
      letter-spacing:1px;
    }

    .logo p{
      margin-top:5px;
      font-size:14px;
      opacity:.8;
    }

    .input-group{
      margin-bottom:20px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      font-weight:500;
    }

    .input-group input{
      width:100%;
      padding:14px 16px;
      border:none;
      border-radius:12px;
      outline:none;
      background:rgba(255,255,255,0.15);
      color:white;
      font-size:15px;
      transition:.3s;
    }

    .input-group input::placeholder{
      color:rgba(255,255,255,0.7);
    }

    .input-group input:focus{
      background:rgba(255,255,255,0.25);
      border:1px solid #93c5fd;
    }

    .login-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      background:#ffffff;
      color:#1e3a8a;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:.3s;
      margin-top:10px;
    }

    .login-btn:hover{
      transform:translateY(-2px);
      background:#dbeafe;
    }

    .error-message{
      margin-top:15px;
      text-align:center;
      font-size:14px;
      color:#fecaca;
      display:none;
    }

    .loading{
      display:none;
      text-align:center;
      margin-top:15px;
      font-size:14px;
    }

    @media(max-width:480px){

      .login-container{
        width:90%;
        padding:30px;
      }

    }

  </style>

</head>
<body>

  <div class="background-circle circle1"></div>
  <div class="background-circle circle2"></div>

  <div class="login-container">

    <div class="logo">
      <h1>APASE WEB</h1>
      <p>Aplikasi Administrasi Sekolah</p>
    </div>

    <div class="input-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Masukkan username">
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Masukkan password">
    </div>

    <button class="login-btn" onclick="login()">
      LOGIN
    </button>

    <div class="loading" id="loading">
      Memeriksa akun...
    </div>

    <div class="error-message" id="errorMessage">
      Username atau password salah
    </div>

  </div>

<script>

  // GANTI DENGAN URL GOOGLE APPS SCRIPT
  const API_URL = "PASTE_URL_APPS_SCRIPT_DISINI";

  async function login(){

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    const errorMessage = document.getElementById("errorMessage");
    const loading = document.getElementById("loading");

    errorMessage.style.display = "none";

    if(username === "" || password === ""){
      errorMessage.innerText = "Username dan password wajib diisi";
      errorMessage.style.display = "block";
      return;
    }

    loading.style.display = "block";

    try{

      const response = await fetch(`${API_URL}?action=login&username=${username}&password=${password}`);

      const result = await response.json();

      loading.style.display = "none";

      if(result.status === "success"){

        localStorage.setItem("loginUser", username);

        window.location.href = "dashboard.html";

      }else{

        errorMessage.innerText = "Username atau password salah";
        errorMessage.style.display = "block";

      }

    }catch(error){

      loading.style.display = "none";

      errorMessage.innerText = "Koneksi gagal";
      errorMessage.style.display = "block";

      console.error(error);

    }

  }

</script>

</body>
</html>
