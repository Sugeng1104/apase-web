<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel APASE WEB</title>

https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
padding:30px;
color:white;
}

.container{
max-width:1400px;
margin:auto;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:35px;
}

.logout-btn{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ef4444;
color:white;
cursor:pointer;
}

/* MENU */
.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
margin-bottom:30px;
}

.menu-card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:20px;
text-align:center;
cursor:pointer;
}

/* TABLE */
.table-container{
background:rgba(255,255,255,0.12);
border-radius:20px;
padding:20px;
margin-bottom:30px;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border:1px solid black;
}

th{
background:rgba(255,255,255,0.1);
}

/* BUTTON */
.action-btn{
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
color:white;
}

.edit-btn{background:#2563eb;}
.delete-btn{background:#dc2626;}

/* MODAL */
.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.modal-content{
background:#1e293b;
margin:5% auto;
padding:25px;
border-radius:20px;
max-width:900px;
}

/* FORM */
.input-group{
margin-bottom:10px;
}

.input-group input{
width:100%;
padding:10px;
border:none;
border-radius:10px;
}

.save-btn{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#fff;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>ADMIN PANEL APASE WEB</h1>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="menu-grid">
<div class="menu-card" onclick="alert('Fitur Profil Sekolah tetap ada ✅')">
Profil Sekolah
</div>

<div class="menu-card" onclick="alert('Fitur Akun Pengguna tetap ada ✅')">
Akun Pengguna
</div>
</div>

<th>NIP</th>
<th>Tugas</th>
<th>NUPTK</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="ptkTable"></tbody>

</table>
</div>

<!-- DATA USER -->
<div class="table-container">
<h3>DATA PENGGUNA</h3>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Username</th>
<th>Password</th>
<th>Email</th>
</tr>
</thead>

<tbody id="userTable"></tbody>

</table>
</div>

</div>

<!-- MODAL EDIT -->
<div class="modal" id="editPTKModal">
<div class="modal-content">
<div id="editPTKContent"></div>
</div>
</div>
