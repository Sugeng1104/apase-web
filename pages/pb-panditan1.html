<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>PB Panditan 1</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(
135deg,
#0f172a,
#1e3a8a,
#2563eb
);

min-height:100vh;

padding:30px;

overflow-x:hidden;

color:white;

}

.container{

max-width:1400px;

margin:auto;

}

/* HEADER */

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:35px;

flex-wrap:wrap;

gap:20px;

}

.title-box h1{

font-size:38px;

font-weight:700;

margin-bottom:8px;

}

.title-box p{

opacity:.8;

font-size:15px;

}

/* BUTTON KEMBALI */

.back-btn{

padding:12px 22px;

background:#facc15;

color:#1e293b;

border:none;

border-radius:14px;

font-weight:700;

font-size:15px;

cursor:pointer;

transition:.3s;

box-shadow:
0 10px 20px rgba(0,0,0,0.2);

}

.back-btn:hover{

transform:translateY(-2px);

background:#fde047;

}

/* CARD */

.card{

background:
rgba(255,255,255,0.12);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.18);

border-radius:30px;

padding:30px;

display:grid;

grid-template-columns:
320px 1fr;

gap:30px;

box-shadow:
0 10px 35px rgba(0,0,0,0.25);

}

/* IMAGE */

.image-box{

display:flex;

justify-content:center;

align-items:flex-start;

}

.image-box img{

width:100%;

max-width:300px;

border-radius:24px;

object-fit:cover;

box-shadow:
0 10px 30px rgba(0,0,0,0.3);

}

/* MENU */

.menu-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:18px;

align-content:start;

}

.menu-btn{

padding:18px 20px;

border:none;

border-radius:20px;

background:
rgba(255,255,255,0.15);

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:.3s;

text-align:left;

box-shadow:
0 8px 20px rgba(0,0,0,0.15);

}

.menu-btn:hover{

transform:translateY(-4px);

background:
rgba(255,255,255,0.22);

}

/* POPUP */

.popup{

display:none;

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

background:
rgba(0,0,0,0.7);

z-index:999;

justify-content:center;

align-items:center;

padding:20px;

overflow:auto;

}

.popup-content{

background:#1e293b;

padding:35px;

border-radius:30px;

max-width:520px;

width:100%;

text-align:center;

animation:popupShow .3s ease;

position:relative;

}

@keyframes popupShow{

from{
opacity:0;
transform:scale(.8);
}

to{
opacity:1;
transform:scale(1);
}

}

.popup-content h2{

margin-bottom:15px;

font-size:28px;

}

.popup-content p{

font-size:16px;

line-height:1.8;

opacity:.9;

}

.close-btn{

margin-top:25px;

padding:12px 24px;

border:none;

border-radius:14px;

background:#facc15;

color:#1e293b;

font-weight:700;

cursor:pointer;

transition:.3s;

}

.close-btn:hover{

background:#fde047;

}

/* UPLOAD */

.folder-btn{

width:100%;

padding:15px;

border:none;

border-radius:16px;

background:#22c55e;

color:white;

font-size:16px;

font-weight:700;

cursor:pointer;

margin-bottom:20px;

transition:.3s;

}

.folder-btn:hover{

background:#16a34a;

}

.folder-status{

margin-bottom:20px;

font-size:14px;

font-weight:600;

color:#facc15;

line-height:1.8;

}

.upload-box{

display:none;

margin-top:10px;

}

.upload-label{

display:block;

margin-bottom:10px;

font-weight:600;

font-size:15px;

text-align:left;

}

.file-input{

width:100%;

padding:14px;

border:none;

border-radius:14px;

background:white;

color:#1e293b;

margin-bottom:20px;

}

.kirim-btn{

width:100%;

padding:15px;

border:none;

border-radius:16px;

background:#64748b;

color:white;

font-size:16px;

font-weight:700;

cursor:not-allowed;

transition:.3s;

}

.kirim-btn.active{

background:#2563eb;

cursor:pointer;

}

.kirim-btn.active:hover{

background:#1d4ed8;

}

.upload-status{

margin-top:18px;

font-size:14px;

font-weight:600;

line-height:1.8;

color:#facc15;

}

@media(max-width:900px){

.card{

grid-template-columns:1fr;

}

.image-box{

justify-content:center;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title-box">

<h1>
PB PANDITAN 1
</h1>

<p>
Pusat Buku dan Administrasi Guru
</p>

</div>

<button class="back-btn"
onclick="window.location.href='https://sugeng1104.github.io/apase-web/dashboard.html'">

Kembali

</button>

</div>

<div class="card">

<div class="image-box">

<img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=1200&auto=format&fit=crop"
alt="Buku">

</div>

<div class="menu-grid">

<button class="menu-btn"
onclick="showPopup('Buku Agama')">
📘 Buku Agama
</button>

<button class="menu-btn"
onclick="showPopup('Buku Bahasa Indonesia')">
📗 Buku Bahasa Indonesia
</button>

<button class="menu-btn"
onclick="showPopup('Buku Pancasila')">
📕 Buku Pancasila
</button>

<button class="menu-btn"
onclick="showPopup('Buku Matematika')">
📙 Buku Matematika
</button>

<button class="menu-btn"
onclick="showPopup('Buku IPAS')">
📘 Buku IPAS
</button>

<button class="menu-btn"
onclick="showPopup('Buku Bahasa Inggris')">
📗 Buku Bahasa Inggris
</button>

<button class="menu-btn"
onclick="showPopup('Buku Kesenian')">
🎨 Buku Kesenian
</button>

<button class="menu-btn"
onclick="showPopup('Buku Bahasa Jawa')">
📕 Buku Bahasa Jawa
</button>

<button class="menu-btn"
onclick="showPopup('Buku BTQ')">
📙 Buku BTQ
</button>

<button class="menu-btn"
onclick="showPopup('Modul Ajar')">
📂 Modul Ajar
</button>

<button class="menu-btn"
onclick="showPopup('Nilai Siswa')">
📊 Nilai Siswa
</button>

<button class="menu-btn"
onclick="showPopup('Jurnal Harian')">
📝 Jurnal Harian
</button>

<button class="menu-btn"
onclick="showPopup('Buku BK')">
📚 Buku BK
</button>

<button class="menu-btn"
onclick="openUploadPopup()">
⬆️ Unggah Berkas
</button>

</div>

</div>

</div>

<!-- POPUP INFO -->

<div class="popup"
id="popup">

<div class="popup-content">

<h2 id="popupTitle">
Informasi
</h2>

<p id="popupText">
Guru belum unggah data
</p>

<button class="close-btn"
onclick="closePopup()">
Tutup
</button>

</div>

</div>

<!-- POPUP UPLOAD -->

<div class="popup"
id="uploadPopup">

<div class="popup-content">

<h2>
Unggah Berkas Guru
</h2>

<button class="folder-btn"
onclick="buatFolder()">
📁 Buat Folder Saya
</button>

<div class="folder-status"
id="folderStatus">
Folder belum dibuat
</div>

<div class="upload-box"
id="uploadBox">

<label class="upload-label">
Pilih File Berkas
</label>

<input type="file"
id="fileInput"
class="file-input">

<button class="kirim-btn"
id="kirimBtn"
disabled
onclick="uploadFile()">

Kirim Berkas

</button>

<div class="upload-status"
id="uploadStatus">
</div>

</div>

<button class="close-btn"
onclick="closeUploadPopup()">
Tutup
</button>

</div>

</div>

<script>

// =====================================
// API URL
// =====================================

const API_URL =
"https://script.google.com/macros/s/AKfycbwo6yEkwQebM4ImabaLk7IWZx7z8l1vGkVOzJw1SlhgW8kwbL7_THG4LzmZfyvBemoo/exec";


// =====================================
// LOGIN USER
// =====================================

const loginUser =
localStorage.getItem("loginUser") || "guru";

const namaPengguna =
localStorage.getItem("namaPengguna") || loginUser;


// =====================================
// SHOW POPUP
// =====================================

function showPopup(namaBuku){

document.getElementById(
"popupTitle"
).innerText = namaBuku;

document.getElementById(
"popupText"
).innerText =
`Guru belum unggah ${namaBuku}`;

document.getElementById(
"popup"
).style.display = "flex";

}


// =====================================
// CLOSE POPUP
// =====================================

function closePopup(){

document.getElementById(
"popup"
).style.display = "none";

}


// =====================================
// OPEN POPUP UPLOAD
// =====================================

function openUploadPopup(){

document.getElementById(
"uploadPopup"
).style.display = "flex";

}


// =====================================
// CLOSE POPUP UPLOAD
// =====================================

function closeUploadPopup(){

document.getElementById(
"uploadPopup"
).style.display = "none";

}


// =====================================
// AKTIFKAN TOMBOL KIRIM
// =====================================

document.getElementById(
"fileInput"
).addEventListener(
"change",
function(){

const btn =
document.getElementById(
"kirimBtn"
);

if(this.files.length > 0){

btn.disabled = false;

btn.classList.add(
"active"
);

}else{

btn.disabled = true;

btn.classList.remove(
"active"
);

}

}
);


// =====================================
// BUAT FOLDER
// =====================================

async function buatFolder(){

const status =
document.getElementById(
"folderStatus"
);

status.innerHTML =
"⏳ Sedang membuat folder...";

try{

const response =
await fetch(API_URL,{

method:"POST",

headers:{
"Content-Type":"text/plain;charset=utf-8"
},

body:JSON.stringify({

action:"createFolderPB",

nama_pengguna:namaPengguna

})

});

const result =
await response.json();

if(result.status === "success"){

localStorage.setItem(
"pbFolderId",
result.folderId
);

status.innerHTML =
`✅ Folder berhasil dibuat : ${namaPengguna}`;

document.getElementById(
"uploadBox"
).style.display = "block";

}else{

status.innerHTML =
"❌ " + result.message;

}

}

catch(error){

status.innerHTML =
"❌ Gagal membuat folder";

console.log(error);

}

}


// =====================================
// UPLOAD FILE
// =====================================

async function uploadFile(){

const fileInput =
document.getElementById(
"fileInput"
);

const status =
document.getElementById(
"uploadStatus"
);

if(fileInput.files.length === 0){

status.innerHTML =
"❌ Pilih file terlebih dahulu";

return;

}

const file =
fileInput.files[0];

status.innerHTML =
"⏳ Membaca file...";

const reader =
new FileReader();

reader.onload = async function(e){

try{

const base64 =
e.target.result;

status.innerHTML =
"⏳ Mengupload file...";

const response =
await fetch(API_URL,{

method:"POST",

headers:{
"Content-Type":"text/plain;charset=utf-8"
},

body:JSON.stringify({

action:"uploadBukuPB",

nama_pengguna:namaPengguna,

nama_buku:file.name,

folder_id:localStorage.getItem(
"pbFolderId"
),

fileName:file.name,

mimeType:file.type,

base64:base64

})

});

const result =
await response.json();

if(result.status === "success"){

status.innerHTML =
"✅ File berhasil diupload";

fileInput.value = "";

document.getElementById(
"kirimBtn"
).disabled = true;

document.getElementById(
"kirimBtn"
).classList.remove(
"active"
);

}else{

status.innerHTML =
"❌ " + result.message;

}

}

catch(error){

status.innerHTML =
"❌ Upload gagal";

console.log(error);

}

};

reader.readAsDataURL(file);

}


// =====================================
// CLOSE CLICK OUTSIDE
// =====================================

window.onclick = function(event){

const popup =
document.getElementById("popup");

const uploadPopup =
document.getElementById("uploadPopup");

if(event.target === popup){

popup.style.display = "none";

}

if(event.target === uploadPopup){

uploadPopup.style.display = "none";

}

}

</script>

</body>
</html>
