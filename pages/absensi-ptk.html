<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Guru & Staf - SDN Panditan I</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #1e293b 100%);
            --glass-bg: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-color: #facc15;
            --accent-glow: rgba(250, 204, 21, 0.2);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }

        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            color: var(--text-main);
            padding: 40px 20px;
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        .container { 
            max-width: 1300px; 
            margin: auto; 
        }
        
        /* HEADER LEVEL LUXURY */
        .header {
            display: flex;
            align-items: center;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 24px 35px;
            border-radius: 24px;
            margin-bottom: 40px;
            gap: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
        }

        .header .logo { 
            width: 75px; 
            height: 75px; 
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .header h1 { 
            font-size: 22px; 
            font-weight: 800; 
            line-height: 1.4; 
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* GRID MAIN */
        .main-content { 
            display: grid; 
            grid-template-columns: 1fr 1.7fr; 
            gap: 35px; 
        }

        /* LEFT PANEL: KEDISIPLINAN */
        .info-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            height: fit-content;
        }

        .faceprint-wrapper {
            position: relative;
            width: 100%;
            max-width: 240px;
            margin: 0 auto 30px auto;
        }

        .faceprint-img {
            width: 100%; 
            height: auto;
            filter: drop-shadow(0px 15px 20px rgba(0,0,0,0.5));
            border-radius: 20px;
        }

        .info-title { 
            font-size: 20px; 
            font-weight: 700; 
            color: var(--accent-color); 
            margin-bottom: 15px; 
            letter-spacing: -0.3px;
        }

        .info-text { 
            font-size: 13.5px; 
            color: var(--text-muted); 
            line-height: 1.75; 
            text-align: justify; 
        }

        /* RIGHT PANEL: ARSIP FOLDER */
        .folder-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 35px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .folder-panel-title {
            font-size: 20px; 
            font-weight: 700; 
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.08); 
            padding-bottom: 15px;
            display: flex; 
            align-items: center; 
            gap: 12px;
        }

        .folder-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); 
            gap: 20px; 
        }

        /* PREMIUM FOLDER CARD EXPERT STYLE */
        .folder-card {
            background: rgba(15, 23, 42, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px 15px; 
            text-align: center;
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .folder-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, rgba(250, 204, 21, 0.08), transparent 60%);
            opacity: 0; transition: opacity 0.4s ease;
        }

        .folder-card:hover { 
            transform: translateY(-6px) scale(1.02); 
            background: rgba(30, 41, 59, 0.7); 
            border-color: rgba(250, 204, 21, 0.4);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(250, 204, 21, 0.1);
        }

        .folder-card:hover::before { opacity: 1; }

        .folder-icon-wrapper {
            position: relative;
            margin-bottom: 15px;
            transition: transform 0.3s ease;
        }
        
        .folder-card:hover .folder-icon-wrapper {
            transform: scale(1.08);
        }

        .folder-icon { 
            font-size: 52px; 
            color: var(--accent-color); 
            filter: drop-shadow(0 4px 10px rgba(250, 204, 21, 0.2));
        }

        .folder-name { 
            font-size: 13.5px; 
            font-weight: 700; 
            color: #f1f5f9;
            margin-bottom: 10px;
            letter-spacing: 0.2px;
        }

        /* STATUS BADGE */
        .status-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 100px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-available {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .badge-empty {
            background: rgba(148, 163, 184, 0.1);
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        /* DISABLED FOLDER CARD */
        .folder-card.disabled { 
            opacity: 0.5; 
        }
        .folder-card.disabled .folder-icon { 
            color: #64748b; 
            filter: none;
        }
        .folder-card.disabled:hover {
            border-color: rgba(239, 68, 68, 0.3);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }

        /* BACK BUTTON MODERN MODERN FLATING */
        .back-btn {
            position: fixed; bottom: 35px; right: 35px;
            padding: 14px 30px; background: var(--accent-color); color: #0f172a;
            border: none; border-radius: 16px; font-weight: 700; font-size: 14px;
            cursor: pointer; box-shadow: 0 10px 25px var(--accent-glow);
            display: flex; align-items: center; gap: 10px; z-index: 99; 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .back-btn:hover { 
            background: #eab308; 
            transform: translateY(-4px); 
            box-shadow: 0 15px 30px rgba(250, 204, 21, 0.4);
        }

        /* GLOWING MODERN DIALOG POPUP */
        .modal {
            display: none; position: fixed; z-index: 9999;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px); padding: 20px;
        }
        .modal-content {
            background: #111827; 
            border: 1px solid rgba(239, 68, 68, 0.2); 
            border-radius: 24px;
            max-width: 450px; margin: 25vh auto auto; padding: 40px 30px; text-align: center;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), 0 0 40px rgba(239, 68, 68, 0.05);
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-icon { font-size: 55px; color: #ef4444; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.2)); }
        .modal-text { font-size: 14.5px; color: #d1d5db; line-height: 1.6; margin-bottom: 30px; }
        .modal-close-btn { width: 100%; padding: 12px; background: #ef4444; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .modal-close-btn:hover { background: #dc2626; }

        /* SKELETON LOADERS (SENSASI WEB ELITE) */
        .skeleton-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 25px 15px; text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }
        .skeleton-icon { width: 55px; height: 55px; background: rgba(255,255,255,0.04); border-radius: 50%; margin-bottom: 15px; position: relative; overflow: hidden; }
        .skeleton-text { width: 80%; height: 14px; background: rgba(255,255,255,0.04); border-radius: 4px; margin-bottom: 10px; position: relative; overflow: hidden; }
        .skeleton-badge { width: 50%; height: 18px; background: rgba(255,255,255,0.03); border-radius: 100px; position: relative; overflow: hidden; }
        
        .skeleton-icon::after, .skeleton-text::after, .skeleton-badge::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 100% { left: 150%; } }

        @media (max-width: 992px) { 
            body { padding: 20px 15px; }
            .main-content { grid-template-columns: 1fr; gap: 30px; } 
            .header { padding: 20px; gap: 15px; }
            .header h1 { font-size: 17px; }
            .back-btn { bottom: 20px; right
