<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ==== SEMUA CSS KAMU TETAP ==== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);padding:30px;color:white;}
.container{max-width:1400px;margin:auto;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:35px;flex-wrap:wrap;}
.logout-btn{padding:12px 22px;border:none;border-radius:14px;background:#ef4444;color:white;cursor:pointer;}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:30px;margin-bottom:35px;}
.menu-card{background:rgba(255,255,255,0.12);padding:35px;border-radius:30px;text-align:center;cursor:pointer;}
.table-container{background:rgba(255,255,255,0.12);padding:25px;border-radius:30px;}
table{width:100%;border-collapse:collapse;}
th,td{padding:15px;border-bottom:1px solid rgba(255,255,255,0.1);}
.modal{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.6);}
.modal-content{background:#1e293b;padding:30px;border-radius:20px;max-width:900px;margin:50px auto;}
.input-group input{padding:14px;border-radius:14px;background:rgba(255,255,255,0.1);color:white;border:none;}
.save-btn{width:100%;padding:14px;background:white;border:none;border-radius:14px;}
.action-btn{padding:8px 12px;border:none;border-radius:10px;color:white;cursor:pointer;}
.edit-btn{background:#2563eb;}
.delete-btn{background:#dc2626;}
</style>
</head>

</thead>

</div>

<th>Username</th>

</tr>
</thead>
<tbody id="userTable"></tbody>
</table>
</div>
