<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Profil Sekolah - APASE WEB</title>

  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{

      min-height:100vh;

      background:
      linear-gradient(
      135deg,
      #0f172a,
      #1e3a8a,
      #2563eb
      );

      padding:30px;

      overflow-x:hidden;

      position:relative;

    }

    /* ========================= */
    /* BACKGROUND */
    /* ========================= */

    .blur1,
    .blur2{

      position:fixed;

      border-radius:50%;

      filter:blur(120px);

      opacity:.4;

      z-index:0;

    }

    .blur1{

      width:350px;
      height:350px;

      background:#60a5fa;

      top:-120px;
      left:-120px;

    }

    .blur2{

      width:350px;
      height:350px;

      background:#2563eb;

      bottom:-120px;
      right:-120px;

    }

    /* ========================= */
    /* CONTAINER */
    /* ========================= */

    .container{

      position:relative;

      z-index:2;

      max-width:1000px;

      margin:auto;

    }

    /* ========================= */
    /* HEADER */
    /* ========================= */

    .header{

      background:
      rgba(255,255,255,0.12);

      backdrop-filter:blur(20px);

      border:
      1px solid rgba(255,255,255,0.15);

      border-radius:35px;

      padding:40px 30px;

      text-align:center;

      color:white;

      margin-bottom:35px;

      box-shadow:
      0 10px 35px rgba(0,0,0,0.25);

    }

    .header img{

      width:130px;
      height:130px;

      object-fit:cover;

      border-radius:50%;

      background:white;

      padding:10px;

      margin-bottom:20px;

      box-shadow:
      0 10px 25px rgba(0,0,0,0.25);

    }

    .header h1{

      font-size:38px;

      font-weight:700;

      letter-spacing:1px;

    }

    /* ========================= */
    /* CARD */
    /* ========================= */

    .card{

      background:
      rgba(255,255,255,0.12);

      backdrop-filter:blur(20px);

      border:
      1px solid rgba(255,255,255,0.15);

      border-radius:35px;

      padding:35px;

      color:white;

      box-shadow:
      0 10px 35px rgba(0,0,0,0.25);

    }

    /* ========================= */
    /* TABLE */
    /* ========================= */

    table{

      width:100%;

      border-collapse:collapse;

    }

    td{

      padding:18px 15px;

      border-bottom:
      1px solid rgba(255,255,255,0.1);

      font-size:16px;

      vertical-align:top;

    }

    td:first-child{

      width:35%;

      font-weight:600;

      color:#dbeafe;

    }

    /* ========================= */
    /* BUTTON */
    /* ========================= */

    .button-area{

      margin-top:35px;

      text-align:center;

    }

    .back-btn{

      display:inline-block;

      padding:14px 28px;

      border-radius:16px;

      background:white;

      color:#1e3a8a;

      text-decoration:none;

      font-weight:700;

      transition:.3s;

      box-shadow:
      0 10px 25px rgba(0,0,0,0.2);

    }

    .back-btn:hover{

      background:#dbeafe;

      transform:translateY(-3px);

    }

    /* ========================= */
    /* LOADING */
    /* ========================= */

    .loading{

      text-align:center;

      font-size:18px;

      padding:30px;

      color:#dbeafe;

    }

    /* ========================= */
    /* RESPONSIVE */
    /* ========================= */

    @media(max-width:700px){

      body{

        padding:15px;

      }

      .header{

        padding:30px 20px;

      }

      .header h1{

        font-size:30px;

      }

      .card{

        padding:25px 20px;

      }

      td{

        display:block;

        width:100%;

      }

      td:first-child{

        padding-bottom:5px;

      }

    }

  </style>

</head>

<body>

  <div class="blur1"></div>
  <div class="blur2"></div>

  <div class="container">

    <div class="header">

      <img src="assets/logo/logo.png"
           alt="Logo Sekolah">

      <h1>
        Profil Sekolah
      </h1>

    </div>

    <div class="card">

      <div class="loading"
           id="loading">

        Memuat data sekolah...

      </div>

      <table id="profilTable"
             style="display:none;">

        <tr>
          <td>Nama Sekolah</td>
          <td id="nama_sekolah">-</td>
        </tr>

        <tr>
          <td>NPSN</td>
          <td id="npsn">-</td>
        </tr>

        <tr>
          <td>Alamat</td>
          <td id="alamat">-</td>
        </tr>

        <tr>
          <td>Desa</td>
          <td id="desa_Sekolah">-</td>
        </tr>

        <tr>
          <td>Kecamatan</td>
          <td id="kecamatan">-</td>
        </tr>

        <tr>
          <td>Kabupaten</td>
          <td id="kabupaten">-</td>
        </tr>

        <tr>
          <td>Provinsi</td>
          <td id="provinsi">-</td>
        </tr>

        <tr>
          <td>Email</td>
          <td id="email">-</td>
        </tr>

      </table>

      <div class="button-area">

        <a href="https://sugeng1104.github.io/apase-web/dashboard.html"
           class="back-btn">

          ← Kembali ke Dashboard

        </a>

      </div>

    </div>

  </div>

  <script>

    // =========================
    // API URL
    // =========================
    const API_URL = "https://script.google.com/macros/s/AKfycbwo6yEkwQebM4ImabaLk7IWZx7z8l1vGkVOzJw1SlhgW8kwbL7_THG4LzmZfyvBemoo/exec";

    // =========================
    // CEK LOGIN
    // =========================
    const loginUser = localStorage.getItem("loginUser");

    if(!loginUser){
      window.location.href = "login.html";
    }

    // =========================
    // LOAD DATA SEKOLAH (BYPASS CORS DENGAN METODE GENERATE SCRIPT/JSONP)
    // =========================
    function loadDataSekolah(){
      
      // Membuat nama callback acak yang unik secara global
      const callbackName = "profilCallback_" + Math.floor(Math.random() * 100000);
      
      // Membuat fungsi global penampung response data dari Google Apps Script
      window[callbackName] = function(result) {
        
        // Bersihkan tag script yang sudah selesai digunakan
        document.getElementById(callbackName).remove();
        delete window[callbackName];

        document.getElementById("loading").style.display = "none";

        if(result && result.status === "success"){
          document.getElementById("profilTable").style.display = "table";
          const data = result.data;

          // Mapping data ke elemen HTML sesuai property di Google Apps Script Anda
          document.getElementById("nama_sekolah").innerText = data.nama_sekolah || "-";
          document.getElementById("npsn").innerText         = data.npsn || "-";
          document.getElementById("alamat").innerText       = data.alamat || "-";
          document.getElementById("desa_Sekolah").innerText  = data.Desa_Sekolah || "-"; // Menggunakan properti berhuruf kapital 'Desa_Sekolah' sesuai Apps Script
          document.getElementById("kecamatan").innerText    = data.Kecamatan || "-";
          document.getElementById("kabupaten").innerText    = data.Kabupaten || "-";
          document.getElementById("provinsi").innerText     = data.Provinsi || "-";
          document.getElementById("email").innerText        = data.email || "-";
        } else {
          document.getElementById("loading").innerHTML = result.message || "Data sekolah tidak ditemukan";
        }
      };

      // Trik Utama: Menggunakan Injeksi Tag Script agar Terhindar dari Blokir CORS Browser secara Mutlak
      const script = document.createElement("script");
      script.id = callbackName;
      // Memanfaatkan trik parameter redirect Google Drive untuk memaksa output teks dibaca sebagai Javascript global
      script.src = `${API_URL}?action=getProfilSekolah&prefix=${callbackName}&t=${new Date().getTime()}`;
      
      // Antisipasi jika server gagal merespons atau URL Apps Script salah
      script.onerror = function() {
        document.getElementById("loading").innerHTML = "Gagal memuat data. Periksa kembali status deployment Apps Script Anda.";
      };

      document.body.appendChild(script);
    }

    // Jalankan pemanggilan data
    loadDataSekolah();

  </script>

</body>
</html>
