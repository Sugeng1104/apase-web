<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Admin Panel APASE WEB</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(
135deg,
#0f172a,
#1e3a8a,
#2563eb
);

padding:30px;

overflow-x:hidden;

color:white;

}

/* CONTAINER */

.container{

max-width:1400px;

margin:auto;

}

/* HEADER */

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:35px;

flex-wrap:wrap;

gap:20px;

}

.header h1{

font-size:38px;

font-weight:700;

}

.logout-btn{

padding:12px 22px;

border:none;

border-radius:14px;

background:#ef4444;

color:white;

font-weight:600;

cursor:pointer;

}

.logout-btn:hover{

background:#dc2626;

}

/* MENU */

.menu-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:30px;

margin-bottom:40px;

}

.menu-card{

background:
rgba(255,255,255,0.12);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.18);

border-radius:30px;

padding:35px 25px;

text-align:center;

cursor:pointer;

transition:.3s;

}

.menu-card:hover{

transform:translateY(-10px);

background:
rgba(255,255,255,0.18);

}

.menu-icon{

width:120px;
height:120px;

margin:auto auto 20px;

border-radius:30px;

background:
rgba(255,255,255,0.15);

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

}

.menu-icon img{

width:70%;
height:70%;

object-fit:contain;

}

.menu-title{

font-size:20px;

font-weight:600;

}

/* TABLE */

.table-container{

background:
rgba(255,255,255,0.12);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.18);

border-radius:30px;

padding:25px;

overflow-x:auto;

}

.table-title{

font-size:24px;

margin-bottom:20px;

font-weight:600;

}

table{

width:100%;

border-collapse:collapse;

}

th,
td{

padding:15px;

text-align:left;

border-bottom:
1px solid rgba(255,255,255,0.1);

font-size:14px;

}

th{

background:
rgba(255,255,255,0.1);

}

/* MODAL */

.modal{

display:none;

position:fixed;

z-index:999;

left:0;
top:0;

width:100%;
height:100%;

overflow:auto;

background:
rgba(0,0,0,0.6);

padding:30px;

}

.modal-content{

background:
#1e293b;

border-radius:30px;

max-width:800px;

margin:auto;

padding:35px;

}

.close{

float:right;

font-size:28px;

cursor:pointer;

}

.form-title{

font-size:28px;

margin-bottom:25px;

font-weight:700;

}

.form-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:18px;

}

.input-group{

display:flex;

flex-direction:column;

}

.input-group label{

margin-bottom:8px;

font-size:14px;

}

.input-group input{

padding:14px;

border:none;

border-radius:14px;

outline:none;

background:
rgba(255,255,255,0.1);

color:white;

}

.save-btn{

width:100%;

margin-top:25px;

padding:15px;

border:none;

border-radius:16px;

background:white;

color:#1e3a8a;

font-size:16px;

font-weight:700;

cursor:pointer;

}

.save-btn:hover{

background:#dbeafe;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>
ADMIN PANEL APASE WEB
</h1>

<button class="logout-btn"
        onclick="logout()">

Logout

</button>

</div>

<!-- MENU -->
<div class="menu-grid">

<!-- PROFIL -->
<div class="menu-card"
     onclick="openModal('profilModal')">

<div class="menu-icon">

<img src="assets/img/profil-sekolah.png">

</div>

<div class="menu-title">

Profil Sekolah

</div>

</div>

<!-- AKUN -->
<div class="menu-card"
     onclick="openModal('akunModal')">

<div class="menu-icon">

<img src="assets/img/akun-pengguna.png">

</div>

<div class="menu-title">

Akun Pengguna

</div>

</div>

</div>

<!-- TABLE -->
<div class="table-container">

<div class="table-title">

Data Pengguna

</div>

<table>

<thead>

<tr>

<th>Nama Pengguna</th>
<th>Username</th>
<th>Password</th>
<th>Email</th>

</tr>

</thead>

<tbody id="userTable">

</tbody>

</table>

</div>

</div>

<!-- MODAL PROFIL -->
<div class="modal"
     id="profilModal">

<div class="modal-content">

<span class="close"
      onclick="closeModal('profilModal')">

&times;

</span>

<div class="form-title">

Form Profil Sekolah

</div>

<div class="form-grid">

<div class="input-group">
<label>Nama Sekolah</label>
<input type="text" id="nama_sekolah">
</div>

<div class="input-group">
<label>NPSN</label>
<input type="text" id="npsn">
</div>

<div class="input-group">
<label>Alamat Sekolah</label>
<input type="text" id="alamat_sekolah">
</div>

<div class="input-group">
<label>Email Sekolah</label>
<input type="email" id="email_sekolah">
</div>

<div class="input-group">
<label>Nama Kepala Sekolah</label>
<input type="text" id="nama_kepsek">
</div>

<div class="input-group">
<label>NIP</label>
<input type="text" id="nip">
</div>

<div class="input-group">
<label>Pangkat / Golongan</label>
<input type="text" id="pangkat">
</div>

<div class="input-group">
<label>Alamat Kepala Sekolah</label>
<input type="text" id="alamat_kepsek">
</div>

<div class="input-group">
<label>Email Kepala Sekolah</label>
<input type="email" id="email_kepsek">
</div>

<div class="input-group">
<label>No. HP</label>
<input type="text" id="nohp">
</div>

</div>

<button class="save-btn"
        onclick="saveProfilSekolah()">

Simpan Data

</button>

</div>

</div>

<!-- MODAL AKUN -->
<div class="modal"
     id="akunModal">

<div class="modal-content">

<span class="close"
      onclick="closeModal('akunModal')">

&times;

</span>

<div class="form-title">

Tambah Akun Pengguna

</div>

<div class="form-grid">

<div class="input-group">
<label>Nama Pengguna</label>
<input type="text" id="nama_pengguna">
</div>

<div class="input-group">
<label>Username</label>
<input type="text" id="username">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password">
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email">
</div>

</div>

<button class="save-btn"
        onclick="saveAkun()">

Buat Akun

</button>

</div>

</div>

<script>

// API
const API_URL =
"https://script.google.com/macros/s/AKfycbwo6yEkwQebM4ImabaLk7IWZx7z8l1vGkVOzJw1SlhgW8kwbL7_THG4LzmZfyvBemoo/exec";

// CEK LOGIN
const loginUser =
localStorage.getItem("loginUser");

if(!loginUser){

window.location.href =
"login.html";

}

// LOGOUT
function logout(){

localStorage.removeItem(
"loginUser"
);

window.location.href =
"login.html";

}

// MODAL
function openModal(id){

document.getElementById(id)
.style.display = "block";

}

function closeModal(id){

document.getElementById(id)
.style.display = "none";

}

// SAVE PROFIL
async function saveProfilSekolah(){

const data = {

action:"saveProfilSekolah",

nama_sekolah:
document.getElementById("nama_sekolah").value,

npsn:
document.getElementById("npsn").value,

alamat_sekolah:
document.getElementById("alamat_sekolah").value,

email_sekolah:
document.getElementById("email_sekolah").value,

nama_kepsek:
document.getElementById("nama_kepsek").value,

nip:
document.getElementById("nip").value,

pangkat:
document.getElementById("pangkat").value,

alamat_kepsek:
document.getElementById("alamat_kepsek").value,

email_kepsek:
document.getElementById("email_kepsek").value,

nohp:
document.getElementById("nohp").value

};

const response =
await fetch(API_URL,{

method:"POST",

body:JSON.stringify(data)

});

const result =
await response.json();

alert(result.message);

}

// SAVE AKUN
async function saveAkun(){

const data = {

action:"saveAkun",

nama_pengguna:
document.getElementById("nama_pengguna").value,

username:
document.getElementById("username").value,

password:
document.getElementById("password").value,

email:
document.getElementById("email").value

};

const response =
await fetch(API_URL,{

method:"POST",

body:JSON.stringify(data)

});

const result =
await response.json();

alert(result.message);

loadUsers();

}

// LOAD USER
async function loadUsers(){

const response =
await fetch(
`${API_URL}?action=getUsers`
);

const result =
await response.json();

let html = "";

result.data.forEach(user => {

html += `

<tr>

<td>${user.nama}</td>
<td>${user.username}</td>
<td>${user.password}</td>
<td>${user.email}</td>

</tr>

`;

});

document.getElementById(
"userTable"
).innerHTML = html;

}

// INIT
loadUsers();

</script>

</body>
</html>
