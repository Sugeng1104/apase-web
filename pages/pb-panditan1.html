<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PB Panditan 1</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb
);

padding:30px;

color:white;

overflow-x:hidden;

}

/* CONTAINER */

.container{

max-width:1400px;

margin:auto;

}

/* HEADER */

.header{

margin-bottom:40px;

text-align:center;

}

.header h1{

font-size:42px;

font-weight:700;

margin-bottom:10px;

}

.header p{

opacity:.8;

font-size:16px;

}

/* CARD */

.micro-card{

display:grid;

grid-template-columns:
420px 1fr;

gap:35px;

background:
rgba(255,255,255,0.10);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.15);

border-radius:35px;

padding:35px;

box-shadow:
0 15px 40px rgba(0,0,0,0.3);

}

/* LEFT IMAGE */

.left-image{

width:100%;

height:100%;

border-radius:28px;

overflow:hidden;

background:
rgba(255,255,255,0.1);

display:flex;

justify-content:center;

align-items:center;

min-height:600px;

}

.left-image img{

width:100%;

height:100%;

object-fit:cover;

}

/* RIGHT MENU */

.menu-list{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

align-content:start;

}

/* ITEM */

.menu-item{

background:
rgba(255,255,255,0.12);

border:
1px solid rgba(255,255,255,0.15);

padding:22px;

border-radius:24px;

cursor:pointer;

transition:.3s;

display:flex;

align-items:center;

gap:15px;

color:white;

}

.menu-item:hover{

transform:
translateY(-5px);

background:
rgba(255,255,255,0.18);

}

.icon{

width:55px;
height:55px;

border-radius:18px;

background:
rgba(255,255,255,0.15);

display:flex;

justify-content:center;

align-items:center;

font-size:24px;

flex-shrink:0;

}

.menu-text{

font-size:16px;

font-weight:600;

line-height:1.4;

}

/* POPUP */

.popup{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:
rgba(0,0,0,0.65);

display:none;

justify-content:center;

align-items:center;

z-index:999;

padding:20px;

}

.popup-content{

background:#1e293b;

padding:35px;

border-radius:28px;

max-width:450px;

width:100%;

text-align:center;

box-shadow:
0 15px 40px rgba(0,0,0,0.4);

animation:fadeIn .3s ease;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(-20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.popup-content h2{

margin-bottom:15px;

font-size:24px;

}

.popup-content p{

opacity:.9;

line-height:1.7;

margin-bottom:25px;

}

.close-btn{

padding:14px 24px;

border:none;

border-radius:16px;

background:#2563eb;

color:white;

font-weight:600;

cursor:pointer;

transition:.3s;

}

.close-btn:hover{

background:#1d4ed8;

}

/* LOADING */

.loading{

text-align:center;

padding:50px;

font-size:18px;

opacity:.8;

}

/* RESPONSIVE */

@media(max-width:950px){

.micro-card{

grid-template-columns:1fr;

}

.left-image{

min-height:300px;

}

}

@media(max-width:600px){

.header h1{

font-size:32px;

}

.menu-list{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<h1>
PB PANDITAN 1
</h1>

<p>
Portal Buku dan Administrasi Sekolah
</p>

</div>

<!-- CARD -->

<div class="micro-card">

<!-- GAMBAR -->

<div class="left-image">

<img
id="coverImage"
src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=1200&auto=format&fit=crop"
alt="Cover">

</div>

<!-- MENU -->

<div>

<div
class="menu-list"
id="menuList">

<div class="loading">
Memuat data...
</div>

</div>

</div>

</div>

</div>

<!-- POPUP -->

<div
class="popup"
id="popupInfo">

<div class="popup-content">

<h2 id="popupTitle">
Informasi
</h2>

<p id="popupText">
Guru belum unggah buku
</p>

<button
class="close-btn"
onclick="closePopup()">

Tutup

</button>

</div>

</div>

<script>

// ======================================
// GOOGLE APPS SCRIPT API
// ======================================

const API_URL =
"https://script.google.com/macros/s/AKfycbwo6yEkwQebM4ImabaLk7IWZx7z8l1vGkVOzJw1SlhgW8kwbL7_THG4LzmZfyvBemoo/exec";


// ======================================
// DEFAULT MENU
// ======================================

const defaultMenus = [

{
nama:"Buku Agama",
icon:"📘"
},

{
nama:"Buku Bahasa Indonesia",
icon:"📚"
},

{
nama:"Buku Pancasila",
icon:"📕"
},

{
nama:"Buku Matematika",
icon:"📗"
},

{
nama:"Buku IPAS",
icon:"🌎"
},

{
nama:"Buku Bahasa Inggris",
icon:"🇬🇧"
},

{
nama:"Buku Kesenian",
icon:"🎨"
},

{
nama:"Buku Bahasa Jawa",
icon:"📝"
},

{
nama:"Buku BTQ",
icon:"🕌"
},

{
nama:"Modul Ajar",
icon:"📂"
},

{
nama:"Nilai Siswa",
icon:"📊"
},

{
nama:"Jurnal Harian",
icon:"📖"
},

{
nama:"Buku BK",
icon:"👨‍🏫"
},

{
nama:"Unggah Berkas",
icon:"⬆️"
}

];


// ======================================
// LOAD DATA
// ======================================

async function loadData(){

try{

const response =
await fetch(
`${API_URL}?action=getPBPanditan1`
);

const result =
await response.json();

const menuList =
document.getElementById(
"menuList"
);

let html = "";

// DATA DARI SPREADSHEET
if(
result.data &&
result.data.length > 0
){

result.data.forEach(item=>{

html += `

<div
class="menu-item"
onclick="cekBuku('${item.nama}')">

<div class="icon">

${item.icon || '📘'}

</div>

<div class="menu-text">

${item.nama}

</div>

</div>

`;

});

// COVER IMAGE
if(result.cover){

document.getElementById(
"coverImage"
).src = result.cover;

}

}

// DEFAULT DATA
else{

defaultMenus.forEach(item=>{

html += `

<div
class="menu-item"
onclick="cekBuku('${item.nama}')">

<div class="icon">

${item.icon}

</div>

<div class="menu-text">

${item.nama}

</div>

</div>

`;

});

}

menuList.innerHTML = html;

}

catch(error){

console.log(error);

document.getElementById(
"menuList"
).innerHTML = `

<div class="loading">

Gagal memuat data

</div>

`;

}

}


// ======================================
// POPUP INFO
// ======================================

function cekBuku(namaBuku){

document.getElementById(
"popupTitle"
).innerText =
namaBuku;

document.getElementById(
"popupText"
).innerText =
`Guru belum unggah ${namaBuku}`;

document.getElementById(
"popupInfo"
).style.display =
"flex";

}


// ======================================
// CLOSE POPUP
// ======================================

function closePopup(){

document.getElementById(
"popupInfo"
).style.display =
"none";

}


// ======================================
// CLOSE SAAT KLIK LUAR
// ======================================

window.onclick = function(event){

const popup =
document.getElementById(
"popupInfo"
);

if(event.target === popup){

popup.style.display =
"none";

}

}


// ======================================
// INIT
// ======================================

loadData();

</script>

</body>
</html>
