<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Admin Panel APASE WEB</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(
135deg,
#0f172a,
#1e3a8a,
#2563eb
);

padding:30px;

color:white;

}

.container{

max-width:1400px;
margin:auto;

}

.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:35px;
flex-wrap:wrap;
gap:20px;

}

.header h1{

font-size:38px;
font-weight:700;

}

.logout-btn{

padding:12px 22px;
border:none;
border-radius:14px;
background:#ef4444;
color:white;
font-weight:600;
cursor:pointer;

}

.menu-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:30px;

margin-bottom:35px;

}

.menu-card{

background:
rgba(255,255,255,0.12);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.18);

border-radius:30px;

padding:35px 25px;

text-align:center;

cursor:pointer;

transition:.3s;

}

.menu-card:hover{

transform:translateY(-10px);

}

.menu-icon{

width:120px;
height:120px;

margin:auto auto 20px;

border-radius:30px;

background:
rgba(255,255,255,0.15);

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

}

.menu-icon img{

width:70%;
height:70%;
object-fit:contain;

}

.menu-title{

font-size:20px;
font-weight:600;

}

/* BOX GURU */

.guru-box{

width:100%;

margin-bottom:35px;

padding:25px 30px;

border-radius:30px;

background:
linear-gradient(
135deg,
#f59e0b,
#ea580c,
#dc2626
);

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:20px;

}

.guru-title{

font-size:28px;
font-weight:700;

}

.upload-btn{

padding:14px 24px;

border:none;

border-radius:16px;

background:white;

color:#dc2626;

font-weight:700;

cursor:pointer;

}

/* TABLE */

.table-container{

background:
rgba(255,255,255,0.12);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.18);

border-radius:30px;

padding:25px;

overflow-x:auto;

}

.table-title{

font-size:24px;
margin-bottom:20px;
font-weight:600;

}

table{

width:100%;
border-collapse:collapse;

}

th,
td{

padding:15px;

text-align:left;

border-bottom:
1px solid rgba(255,255,255,0.1);

font-size:14px;

}

th{

background:
rgba(255,255,255,0.1);

}

/* MODAL */

.modal{

display:none;

position:fixed;

z-index:999;

left:0;
top:0;

width:100%;
height:100%;

overflow:auto;

background:
rgba(0,0,0,0.6);

padding:30px;

}

.modal-content{

background:#1e293b;

border-radius:30px;

max-width:700px;

margin:auto;

padding:35px;

}

.close{

float:right;

font-size:28px;

cursor:pointer;

}

.form-title{

font-size:28px;

margin-bottom:25px;

font-weight:700;

}

.form-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:18px;

}

.input-group{

display:flex;
flex-direction:column;

}

.input-group label{

margin-bottom:8px;

}

.input-group input{

padding:14px;

border:none;

border-radius:14px;

background:
rgba(255,255,255,0.1);

color:white;

}

.save-btn{

width:100%;

margin-top:25px;

padding:15px;

border:none;

border-radius:16px;

background:white;

color:#1e3a8a;

font-size:16px;

font-weight:700;

cursor:pointer;

}

#uploadStatus{

margin-top:20px;
text-align:center;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>
ADMIN PANEL APASE WEB
</h1>

<button class="logout-btn"
        onclick="logout()">

Logout

</button>

</div>

<!-- MENU -->

<div class="menu-grid">

<div class="menu-card">

<div class="menu-icon">

<img src="assets/img/profil-sekolah.png">

</div>

<div class="menu-title">

Profil Sekolah

</div>

</div>

<div class="menu-card">

<div class="menu-icon">

<img src="assets/img/akun-pengguna.png">

</div>

<div class="menu-title">

Akun Pengguna

</div>

</div>

</div>

<!-- DATA GURU -->

<div class="guru-box">

<div class="guru-title">

DATA GURU DAN TENDIK

</div>

<button class="upload-btn"
        onclick="openModal('uploadModal')">

Unggah CSV

</button>

</div>

<!-- TABLE -->

<div class="table-container">

<div class="table-title">

Data Pengguna

</div>

<table>

<thead>

<tr>

<th>Nama Pengguna</th>
<th>Username</th>
<th>Password</th>
<th>Email</th>

</tr>

</thead>

<tbody id="userTable">

</tbody>

</table>

</div>

</div>

<!-- MODAL UPLOAD -->

<div class="modal"
     id="uploadModal">

<div class="modal-content">

<span class="close"
      onclick="closeModal('uploadModal')">

&times;

</span>

<div class="form-title">

Upload CSV Guru & Tendik

</div>

<div style="margin-bottom:20px;">

Silakan pilih file CSV

</div>

<div class="input-group">

<input type="file"
       id="csvFile"
       accept=".csv">

</div>

<button class="save-btn"
        onclick="uploadCSV()">

Kirim File

</button>

<div id="uploadStatus"></div>

</div>

</div>

<script>

// URL WEB APP APPS SCRIPT
const API_URL =
"https://script.google.com/macros/s/AKfycbwo6yEkwQebM4ImabaLk7IWZx7z8l1vGkVOzJw1SlhgW8kwbL7_THG4LzmZfyvBemoo/exec";

// LOGIN
const loginUser =
localStorage.getItem("loginUser");

if(!loginUser){

window.location.href =
"login.html";

}

// LOGOUT
function logout(){

localStorage.removeItem(
"loginUser"
);

window.location.href =
"index.html";

}

// MODAL
function openModal(id){

document.getElementById(id)
.style.display = "block";

}

function closeModal(id){

document.getElementById(id)
.style.display = "none";

}

// LOAD USER
async function loadUsers(){

try{

const response =
await fetch(
`${API_URL}?action=getUsers`
);

const result =
await response.json();

let html = "";

result.data.forEach(user => {

html += `

<tr>

<td>${user.nama}</td>
<td>${user.username}</td>
<td>${user.password}</td>
<td>${user.email}</td>

</tr>

`;

});

document.getElementById(
"userTable"
).innerHTML = html;

}catch(error){

console.log(error);

}

}

// UPLOAD CSV
async function uploadCSV(){

const fileInput =
document.getElementById("csvFile");

const status =
document.getElementById("uploadStatus");

if(fileInput.files.length === 0){

status.innerHTML =
"Silakan pilih file CSV";

return;

}

const file =
fileInput.files[0];

status.innerHTML =
"Membaca file...";

const reader =
new FileReader();

reader.onload =
async function(e){

try{

status.innerHTML =
"Mengupload file...";

const base64 =
e.target.result;

const response =
await fetch(API_URL,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"uploadFileArsip",

fileName:file.name,

mimeType:file.type,

base64:base64

})

});

const result =
await response.json();

if(result.status === "success"){

status.innerHTML = `

<div style="
background:#16a34a;
padding:14px;
border-radius:14px;
margin-top:15px;
">

${result.message}

</div>

`;

}else{

status.innerHTML = `

<div style="
background:#dc2626;
padding:14px;
border-radius:14px;
margin-top:15px;
">

${result.message}

</div>

`;

}

}catch(error){

status.innerHTML = `

<div style="
background:#dc2626;
padding:14px;
border-radius:14px;
margin-top:15px;
">

${error}

</div>

`;

}

};

reader.readAsDataURL(file);

}

// INIT
loadUsers();

</script>

</body>
</html>
