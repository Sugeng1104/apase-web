<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>PB Panditan 1</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(
135deg,
#0f172a,
#1e3a8a,
#2563eb
);

min-height:100vh;

padding:30px;

overflow-x:hidden;

color:white;

}

.container{

max-width:1400px;

margin:auto;

}

/* HEADER */

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:35px;

flex-wrap:wrap;

gap:20px;

}

.title-box h1{

font-size:38px;

font-weight:700;

margin-bottom:8px;

}

.title-box p{

opacity:.8;

font-size:15px;

}

/* BUTTON KEMBALI */

.back-btn{

padding:12px 22px;

background:#facc15;

color:#1e293b;

border:none;

border-radius:14px;

font-weight:700;

font-size:15px;

cursor:pointer;

transition:.3s;

box-shadow:
0 10px 20px rgba(0,0,0,0.2);

}

.back-btn:hover{

transform:translateY(-2px);

background:#fde047;

}

/* CARD */

.card{

background:
rgba(255,255,255,0.12);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.18);

border-radius:30px;

padding:30px;

display:grid;

grid-template-columns:
320px 1fr;

gap:30px;

box-shadow:
0 10px 35px rgba(0,0,0,0.25);

}

/* IMAGE */

.image-box{

display:flex;

justify-content:center;

align-items:flex-start;

}

.image-box img{

width:100%;

max-width:300px;

border-radius:24px;

object-fit:cover;

box-shadow:
0 10px 30px rgba(0,0,0,0.3);

}

/* MENU */

.menu-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:18px;

align-content:start;

}

.menu-btn{

padding:18px 20px;

border:none;

border-radius:20px;

background:
rgba(255,255,255,0.15);

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:.3s;

text-align:left;

box-shadow:
0 8px 20px rgba(0,0,0,0.15);

}

.menu-btn:hover{

transform:translateY(-4px);

background:
rgba(255,255,255,0.22);

}

/* POPUP */

.popup{

display:none;

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

background:
rgba(0,0,0,0.7);

z-index:999;

justify-content:center;

align-items:center;

padding:20px;

}

.popup-content{

background:#1e293b;

padding:35px;

border-radius:30px;

max-width:450px;

width:100%;

text-align:center;

animation:popupShow .3s ease;

}

@keyframes popupShow{

from{
opacity:0;
transform:scale(.8);
}

to{
opacity:1;
transform:scale(1);
}

}

.popup-content h2{

margin-bottom:15px;

font-size:28px;

}

.popup-content p{

font-size:16px;

line-height:1.8;

opacity:.9;

}

.close-btn{

margin-top:25px;

padding:12px 24px;

border:none;

border-radius:14px;

background:#facc15;

color:#1e293b;

font-weight:700;

cursor:pointer;

transition:.3s;

}

.close-btn:hover{

background:#fde047;

}

@media(max-width:900px){

.card{

grid-template-columns:1fr;

}

.image-box{

justify-content:center;

}

}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<div class="title-box">

<h1>
PB PANDITAN 1
</h1>

<p>
Pusat Buku dan Administrasi Guru
</p>

</div>

<button class="back-btn"
onclick="window.location.href='https://sugeng1104.github.io/apase-web/dashboard.html'">

Kembali

</button>

</div>

<!-- CARD -->

<div class="card">

<!-- IMAGE -->

<div class="image-box">

<img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=1200&auto=format&fit=crop"
     alt="Buku">

</div>

<!-- MENU -->

<div class="menu-grid">

<button class="menu-btn"
onclick="showPopup('Buku Agama')">

📘 Buku Agama

</button>

<button class="menu-btn"
onclick="showPopup('Buku Bahasa Indonesia')">

📗 Buku Bahasa Indonesia

</button>

<button class="menu-btn"
onclick="showPopup('Buku Pancasila')">

📕 Buku Pancasila

</button>

<button class="menu-btn"
onclick="showPopup('Buku Matematika')">

📙 Buku Matematika

</button>

<button class="menu-btn"
onclick="showPopup('Buku IPAS')">

📘 Buku IPAS

</button>

<button class="menu-btn"
onclick="showPopup('Buku Bahasa Inggris')">

📗 Buku Bahasa Inggris

</button>

<button class="menu-btn"
onclick="showPopup('Buku Kesenian')">

🎨 Buku Kesenian

</button>

<button class="menu-btn"
onclick="showPopup('Buku Bahasa Jawa')">

📕 Buku Bahasa Jawa

</button>

<button class="menu-btn"
onclick="showPopup('Buku BTQ')">

📙 Buku BTQ

</button>

<button class="menu-btn"
onclick="showPopup('Modul Ajar')">

📂 Modul Ajar

</button>

<button class="menu-btn"
onclick="showPopup('Nilai Siswa')">

📊 Nilai Siswa

</button>

<button class="menu-btn"
onclick="showPopup('Jurnal Harian')">

📝 Jurnal Harian

</button>

<button class="menu-btn"
onclick="showPopup('Buku BK')">

📚 Buku BK

</button>

<button class="menu-btn"
onclick="showPopup('Unggah Berkas')">

⬆️ Unggah Berkas

</button>

</div>

</div>

</div>

<!-- POPUP -->

<div class="popup"
id="popup">

<div class="popup-content">

<h2 id="popupTitle">

Informasi

</h2>

<p id="popupText">

Guru belum unggah data

</p>

<button class="close-btn"
onclick="closePopup()">

Tutup

</button>

</div>

</div>

<script>

// SHOW POPUP

function showPopup(namaBuku){

document.getElementById(
"popupTitle"
).innerText = namaBuku;

document.getElementById(
"popupText"
).innerText =
`Guru belum unggah ${namaBuku}`;

document.getElementById(
"popup"
).style.display = "flex";

}

// CLOSE POPUP

function closePopup(){

document.getElementById(
"popup"
).style.display = "none";

}

// CLOSE CLICK OUTSIDE

window.onclick = function(event){

const popup =
document.getElementById("popup");

if(event.target === popup){

popup.style.display = "none";

}

}

</script>

</body>
</html>
