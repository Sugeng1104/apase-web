<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel APASE WEB</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);padding:30px;color:white;}
.container{max-width:1400px;margin:auto;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
.logout-btn{padding:10px 20px;border:none;border-radius:10px;background:red;color:white;cursor:pointer;}

.table-container{background:rgba(255,255,255,0.1);padding:20px;border-radius:20px;margin-bottom:30px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid black;padding:10px;}
th{background:rgba(255,255,255,0.2);}

.action-btn{padding:8px 12px;border:none;border-radius:8px;color:white;cursor:pointer;}
.edit-btn{background:#2563eb;}
.delete-btn{background:#dc2626;}

.modal{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.7);}
.modal-content{background:#1e293b;margin:5% auto;padding:20px;border-radius:20px;width:90%;max-width:800px;}

.input-group{margin-bottom:10px;}
.input-group input{width:100%;padding:10px;border-radius:10px;border:none;}

.save-btn{padding:12px;background:white;color:black;border:none;border-radius:10px;width:100%;cursor:pointer;}
</style>

</head>
<body>

<div class="container">

<div class="header">
<h1>ADMIN PANEL APASE WEB</h1>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- PTK -->
<div class="table-container">
<h2>DATA PTK</h2>
<table>
<thead>
<tr>
<th>Nama</th>
<th>NIP</th>
<th>Tugas</th>
<th>NUPTK</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="ptkTable"></tbody>
</table>
</div>

<!-- USER -->
<div class="table-container">
<h2>Data User</h2>
<table>
<thead>
<tr>
<th>Nama</th>
<th>Username</th>
<th>Password</th>
<th>Email</th>
</tr>
</thead>
<tbody id="userTable"></tbody>
</table>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="editModal">
<div class="modal-content">
<div id="formEdit"></div>
</div>
</div>

<script>

// API
const API_URL = "https://script.google.com/macros/s/AKfycbwo6yEkwQebM4ImabaLk7IWZx7z8l1vGkVOzJw1SlhgW8kwbL7_THG4LzmZfyvBemoo/exec";
const PTK_API = "https://script.google.com/macros/s/AKfycbydbCQVMuU59haYmboDhQXHmac8J9PqnXLQEsUmn24ZY7OOuGscucigcLEZBLmbw8IJ/exec?action=getDataPTK";

let selected = null;

// LOGIN
if(!localStorage.getItem("loginUser")) location.href="index.html";

// LOGOUT
function logout(){
localStorage.removeItem("loginUser");
location.href="index.html";
}

// LOAD USER
async function loadUsers(){
const r=await fetch(API_URL+"?action=getUsers");
const j=await r.json();

let html="";
j.data.forEach(u=>{
html+=`<tr>
<td>${u.nama}</td>
<td>${u.username}</td>
<td>${u.password}</td>
<td>${u.email}</td>
</tr>`;
});
userTable.innerHTML=html;
}

// LOAD PTK ✅ FIX
async function loadPTK(){
const r=await fetch(PTK_API);
const j=await r.json();

window.dataPTK=j.data;

let html="";
j.data.forEach((d,i)=>{
html+=`<tr>
<td>${d.nama}</td>
<td>${d.nip}</td>
<td>${d.tugas}</td>
<td>${d.nuptk}</td>
<td>${d.status}</td>
<td>
<button class="action-btn edit-btn" onclick="edit(${i})">Edit</button>
<button class="action-btn delete-btn" onclick="hapus(${i})">Hapus</button>
</td>
</tr>`;
});
ptkTable.innerHTML=html;
}

// EDIT
function edit(i){
selected=dataPTK[i];

let f=`
<h3>Edit PTK</h3>

${input("nama","Nama")}
${input("nip","NIP")}
${input("tempat_lahir","Tempat")}
${input("tanggal_lahir","Tanggal")}
${input("pangkat","Pangkat")}
${input("pendidikan","Pendidikan")}
${input("tugas","Tugas")}
${input("mulai","Mulai")}
${input("nuptk","NUPTK")}
${input("alamat","Alamat")}
${input("status","Status")}

<button class="save-btn" onclick="save()">Simpan</button>
`;
formEdit.innerHTML=f;
editModal.style.display="block";
}

// INPUT
function input(id,label){
return `<div class="input-group">
<label>${label}</label>
<input id="${id}" value="${selected[id]||""}">
</div>`;
}

// SAVE ✅
async function save(){

const data={
action:"updatePTK",
row:selected.row,
no:selected.no,
nama:v("nama"),
nip:v("nip"),
tempat_lahir:v("tempat_lahir"),
tanggal_lahir:v("tanggal_lahir"),
pangkat:v("pangkat"),
pendidikan:v("pendidikan"),
tugas:v("tugas"),
mulai:v("mulai"),
nuptk:v("nuptk"),
alamat:v("alamat"),
status:v("status")
};

await fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
});

alert("Berhasil disimpan");
editModal.style.display="none";
loadPTK();
}

function v(id){return document.getElementById(id).value}

// DELETE ✅
async function hapus(i){
if(!confirm("Yakin hapus?"))return;

let d=dataPTK[i];

await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"deletePTK",
row:d.row
})
});

alert("Data dihapus");
loadPTK();
}

// INIT
loadUsers();
loadPTK();

</script>

</body>
</html>
