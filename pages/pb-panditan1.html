<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PB Panditan 1</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);color:white;min-height:100vh;padding:30px;}
.container{max-width:1400px;margin:auto;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
.user-login{background:rgba(255,255,255,.15);padding:12px 18px;border-radius:14px;font-weight:600;}
.back-btn{padding:10px 18px;border:none;border-radius:12px;background:#facc15;font-weight:700;cursor:pointer;}
.card{display:grid;grid-template-columns:300px 1fr;gap:25px;background:rgba(255,255,255,.1);padding:25px;border-radius:20px;}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;}
.menu-btn{padding:15px;border:none;border-radius:14px;background:rgba(255,255,255,.15);color:white;font-weight:600;}
.popup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);justify-content:center;align-items:center;}
.popup-content{background:#1e293b;padding:30px;border-radius:20px;width:90%;max-width:600px;}
.folder-btn{width:100%;padding:12px;border:none;border-radius:12px;background:#22c55e;color:white;font-weight:700;}
.folder-status{margin:15px 0;color:#facc15;}
.upload-item{padding:15px;background:rgba(255,255,255,.1);border-radius:12px;margin-bottom:10px;}
.upload-btn{width:100%;padding:10px;border:none;border-radius:10px;background:#2563eb;color:white;font-weight:700;}
.status-text{margin-top:8px;font-size:13px;}
</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="user-login">
👤 <span id="userLogin">Loading...</span>
</div>

<button class="back-btn" onclick="history.back()">Kembali</button>

</div>

<div class="card">

<div>
<img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=1200" style="width:100%;border-radius:16px;">
</div>

<div class="menu-grid">

<button class="menu-btn">📘 Buku Agama</button>
<button class="menu-btn">📗 Buku Bahasa Indonesia</button>
<button class="menu-btn">📕 Buku Pancasila</button>
<button class="menu-btn">📙 Buku Matematika</button>
<button class="menu-btn">📂 Modul Ajar</button>

<button class="menu-btn" onclick="openUpload()">⬆️ Upload</button>

</div>

</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">

<div class="popup-content">

<h3>Upload Berkas</h3>

<button class="folder-btn" onclick="createFolder()">Buat Folder</button>

<div class="folder-status" id="folderStatus">Belum dibuat</div>

<div id="uploadBox" style="display:none;"></div>

</div>

</div>

<script>

// =====================
// SAMA PERSIS DASHBOARD
// =====================
const loginUser = localStorage.getItem("loginUser");
const loginNama = localStorage.getItem("namaPengguna");

if(!loginUser){
window.location.href = "index.html";
}

document.getElementById("userLogin").innerText =
loginNama || loginUser;

// =====================
// VAR
// =====================
let folderId = "";
const API = "https://script.google.com/macros/s/AKfycbwo6yEkwQebM4ImabaLk7IWZx7z8l1vGkVOzJw1SlhgW8kwbL7_THG4LzmZfyvBemoo/exec";

// =====================
function openUpload(){
document.getElementById("popup").style.display="flex";
}

// =====================
function createFolder(){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"createFolderPB",
nama_pengguna: loginNama || loginUser
}),
headers:{ "Content-Type":"text/plain;charset=utf-8" }
})
.then(r=>r.json())
.then(res=>{
if(res.status==="success"){
folderId=res.folderId;
document.getElementById("folderStatus").innerText="Folder siap";
}
});
}

</script>

</body>
</html>
