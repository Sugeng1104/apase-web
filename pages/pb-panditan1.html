<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PB Panditan 1</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* UI TIDAK DIUBAH */
/* ========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
min-height:100vh;
padding:30px;
color:white;
}

.container{max-width:1400px;margin:auto;}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:35px;
flex-wrap:wrap;
gap:20px;
}

.user-login{
background:rgba(255,255,255,0.15);
padding:14px 22px;
border-radius:18px;
font-size:15px;
font-weight:600;
backdrop-filter:blur(12px);
}

.title-box h1{font-size:38px;font-weight:700;margin-bottom:8px;}
.title-box p{opacity:.8;font-size:15px;}

.back-btn{
padding:12px 22px;
background:#facc15;
color:#1e293b;
border:none;
border-radius:14px;
font-weight:700;
cursor:pointer;
}

.card{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.18);
border-radius:30px;
padding:30px;
display:grid;
grid-template-columns:320px 1fr;
gap:30px;
}

.image-box img{
width:100%;
max-width:300px;
border-radius:24px;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

.menu-btn{
padding:18px;
border:none;
border-radius:20px;
background:rgba(255,255,255,0.15);
color:white;
font-weight:600;
cursor:pointer;
}

.menu-btn:hover{
background:rgba(255,255,255,0.22);
transform:translateY(-3px);
}

.popup{
display:none;
position:fixed;
left:0;top:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
padding:20px;
}

.popup-content{
background:#1e293b;
padding:35px;
border-radius:30px;
max-width:700px;
width:100%;
text-align:center;
}

.folder-btn{
width:100%;
padding:15px;
border:none;
border-radius:16px;
background:#22c55e;
color:white;
font-weight:700;
cursor:pointer;
margin-bottom:20px;
}

.upload-item{
margin-bottom:20px;
padding:18px;
background:rgba(255,255,255,0.08);
border-radius:18px;
text-align:left;
}

.upload-item input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
margin-bottom:10px;
}

.upload-btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-weight:700;
cursor:pointer;
}

.upload-success{
background:#22c55e !important;
}

.status-text{
font-size:14px;
margin-top:8px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="user-login" id="userLogin">
👤 Memuat user...
</div>

<div class="title-box">
<h1>PB PANDITAN 1</h1>
<p>Pusat Buku dan Administrasi Guru</p>
</div>

<button class="back-btn"
onclick="window.location.href='dashboard.html'">
Kembali
</button>

</div>

<div class="card">

<div class="image-box">
<img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=1200">
</div>

<div class="menu-grid">

<button class="menu-btn">📘 Buku Agama</button>
<button class="menu-btn">📗 Buku Bahasa Indonesia</button>
<button class="menu-btn">📕 Buku Pancasila</button>
<button class="menu-btn">📙 Buku Matematika</button>
<button class="menu-btn">📘 IPAS</button>
<button class="menu-btn">📂 Modul Ajar</button>

<button class="menu-btn" onclick="openUploadPopup()">
⬆️ Upload
</button>

</div>

</div>

</div>

<!-- POPUP -->
<div class="popup" id="uploadPopup">
<div class="popup-content">

<h2>Upload Guru</h2>

<button class="folder-btn" id="folderBtn" onclick="buatFolder()">
📁 Buat Folder
</button>

<div id="folderStatus">Folder belum dibuat</div>

<div id="uploadContainer"></div>

</div>
</div>

<script>

// =====================
// CONFIG
// =====================

const API_URL =
"https://script.google.com/macros/s/AKfycbwo6yEkwQebM4ImabaLk7IWZx7z8l1vGkVOzJw1SlhgW8kwbL7_THG4LzmZfyvBemoo/exec";

// =====================
// SESSION FIX
// =====================

const usernameLogin =
localStorage.getItem("username") ||
localStorage.getItem("nama_pengguna") ||
localStorage.getItem("user") || "";

let namaPengguna = "";
let folderId = "";
let userReady = false;

// =====================
// LOAD USER
// =====================

window.onload = function(){
initUser();
};

async function initUser(){

const el = document.getElementById("userLogin");

if(!usernameLogin){

el.innerHTML = "❌ Session kosong";

setTimeout(()=> location.href="index.html",1500);
return;
}

try{

const res = await fetch(API_URL + "?action=getUsers&_=" + Date.now());
const data = await res.json();

const user = data.data.find(u =>
String(u.username).trim() === String(usernameLogin).trim()
);

if(!user){

el.innerHTML = "❌ User tidak ditemukan";
setTimeout(()=> location.href="index.html",1500);
return;
}

namaPengguna = user.nama;
el.innerHTML = "👤 " + namaPengguna;

userReady = true;

}catch(e){
el.innerHTML = "❌ Error server";
}

}

// =====================
// POPUP
// =====================

function openUploadPopup(){

if(!userReady) return alert("User belum siap");

document.getElementById("uploadPopup").style.display="flex";

cekFolder();

}

function cekFolder(){

fetch(API_URL+"?action=checkFolderPB&nama_pengguna="+encodeURIComponent(namaPengguna))
.then(r=>r.json())
.then(res=>{

if(res.exists){
folderId = res.folderId;
document.getElementById("folderStatus").innerHTML="Folder aktif";
renderUpload();
}else{
document.getElementById("folderStatus").innerHTML="Belum ada folder";
}
});

}

// =====================
// BUAT FOLDER
// =====================

function buatFolder(){

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"createFolderPB",
nama_pengguna:namaPengguna
})
}).then(r=>r.json()).then(res=>{
if(res.status=="success"){
folderId = res.folderId;
cekFolder();
}
});

}

// =====================
// RENDER UPLOAD
// =====================

const daftarBuku=["Buku Agama","Buku Indo","Matematika"];

function renderUpload(){

const c=document.getElementById("uploadContainer");
c.innerHTML="";

daftarBuku.forEach((b,i)=>{

c.innerHTML+=`
<div class="upload-item">
<h3>${b}</h3>
<input type="file" id="f${i}">
<button class="upload-btn" onclick="upload(${i},'${b}')">Upload</button>
<div id="s${i}" class="status-text"></div>
</div>
`;

});

}

// =====================
// UPLOAD
// =====================

function upload(i,nama){

const f=document.getElementById("f"+i);
const s=document.getElementById("s"+i);

if(!f.files.length){
s.innerHTML="Pilih file";
return;
}

const file=f.files[0];
const r=new FileReader();

r.onload=async function(e){

const base64=e.target.result;

const res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"uploadBukuPB",
nama_pengguna:namaPengguna,
nama_buku:nama,
folder_id:folderId,
fileName:file.name,
mimeType:file.type,
base64:base64
})
});

const out=await res.json();

s.innerHTML=out.status=="success"?"OK":"ERROR";

};

r.readAsDataURL(file);

}

</script>

</body>
</html>
