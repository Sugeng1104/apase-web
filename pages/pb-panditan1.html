<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PB Panditan 1</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
min-height:100vh;
padding:30px;
color:white;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
gap:15px;
}

.title-box h1{font-size:38px}
.title-box p{opacity:.8}

/* CARD */
.card{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(20px);
border-radius:30px;
padding:30px;
display:grid;
grid-template-columns:320px 1fr;
gap:25px;
}

.image-box img{
width:100%;
border-radius:24px;
}

/* MENU */
.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

/* BUTTON MENU */
.menu-btn{
padding:16px;
border:none;
border-radius:18px;
background:rgba(255,255,255,0.15);
color:white;
font-weight:600;
cursor:pointer;
transition:.3s;
opacity:0;
transform:translateY(20px);
animation:fade .4s forwards;
}

.menu-btn:hover{
transform:translateY(-4px);
background:rgba(255,255,255,0.25);
}

@keyframes fade{
to{opacity:1;transform:translateY(0)}
}

/* POPUP */
.popup{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.75);
justify-content:center;
align-items:center;
padding:20px;
}

.popup-content{
background:#1e293b;
padding:25px;
border-radius:20px;
width:100%;
max-width:750px;
}

/* FOLDER */
.folder-btn{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#22c55e;
color:white;
font-weight:700;
cursor:pointer;
margin-bottom:10px;
}

.folder-status{
text-align:center;
margin-bottom:10px;
color:#facc15;
font-weight:600;
}

/* UPLOAD */
.upload-item{
background:rgba(255,255,255,0.08);
padding:14px;
border-radius:14px;
margin-bottom:10px;
}

.upload-btn{
width:100%;
padding:10px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.upload-btn:disabled{
background:#64748b;
cursor:not-allowed;
}

.status-text{
font-size:13px;
margin-top:6px;
color:#facc15;
}

/* CLOSE */
.close-btn{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#ef4444;
color:white;
font-weight:700;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<div>
<h1>PB PANDITAN 1</h1>
<p>Pusat Buku Guru Digital</p>
</div>

<button class="folder-btn" onclick="openPopup()">⬆️ Upload</button>
</div>

<div class="card">

<div class="image-box">
<img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f">
</div>

<div class="menu-grid">

<button class="menu-btn">📘 Agama</button>
<button class="menu-btn">📗 Indonesia</button>
<button class="menu-btn">📕 Pancasila</button>
<button class="menu-btn">📙 Matematika</button>
<button class="menu-btn">📘 IPAS</button>
<button class="menu-btn">📗 Inggris</button>
<button class="menu-btn">🎨 Kesenian</button>
<button class="menu-btn">📕 Jawa</button>
<button class="menu-btn">📙 BTQ</button>
<button class="menu-btn">📂 Modul</button>
<button class="menu-btn">📊 Nilai</button>
<button class="menu-btn">📝 Jurnal</button>
<button class="menu-btn">📚 BK</button>

</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">

<div class="popup-content">

<h2>Upload Perangkat Guru</h2>

<button class="folder-btn" id="btnFolder" onclick="buatFolder()">
📁 Buat Folder Tahun Ini
</button>

<div class="folder-status" id="status">Folder belum dibuat</div>

<div id="uploadArea"></div>

<button class="close-btn" onclick="closePopup()">Tutup</button>

</div>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwo6yEkwQebM4ImabaLk7IWZx7z8l1vGkVOzJw1SlhgW8kwbL7_THG4LzmZfyvBemoo/exec";

const loginUser=localStorage.getItem("loginUser");
const namaPengguna=localStorage.getItem("namaPengguna");

let folderId="";
let tahunAjaran=getTahun();

const daftarBuku=[
"Buku Agama","Buku Bahasa Indonesia","Buku Pancasila","Buku Matematika",
"Buku IPAS","Buku Bahasa Inggris","Buku Kesenian","Buku Bahasa Jawa",
"Buku BTQ","Modul Ajar","Nilai Siswa","Jurnal Harian","Buku BK"
];

function getTahun(){
let y=new Date().getFullYear();
return y+"-"+(y+1);
}

function openPopup(){
document.getElementById("popup").style.display="flex";
loadStatusUpload();
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* ===== CEK UPLOAD TERDAHULU ===== */
async function loadStatusUpload(){

let res=await fetch(API_URL+"?action=getPBStatus&nama_pengguna="+namaPengguna);
let data=await res.json();

renderUpload(data.data||[]);
}

function renderUpload(dataUploaded){

let el=document.getElementById("uploadArea");
el.innerHTML="";

daftarBuku.forEach((b,i)=>{

let sudah=dataUploaded.find(x=>x.nama_buku===b);

el.innerHTML+=`
<div class="upload-item">
<div><b>${b}</b></div>
<input type="file" id="f${i}" ${sudah?"disabled":""}>

<button class="upload-btn"
id="btn${i}"
onclick="upload(${i},'${b}')"
${sudah?"disabled":""}>
${sudah?"✔ Sudah Upload":"Upload"}
</button>

<div class="status-text" id="s${i}">
${sudah?"Sudah pernah diupload":""}
</div>
</div>
`;

});

}

/* ===== FOLDER MULTI TAHUN ===== */
function buatFolder(){

fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({
action:"createFolderPB",
nama_pengguna:namaPengguna,
tahun:tahunAjaran
})
})
.then(r=>r.json())
.then(res=>{
if(res.status==="success"){
folderId=res.folderId;
document.getElementById("status").innerHTML="Folder "+tahunAjaran+" siap";
renderUpload([]);
}
});
}

/* ===== UPLOAD ===== */
function upload(i,buku){

let file=document.getElementById("f"+i).files[0];
let status=document.getElementById("s"+i);

if(!file){
status.innerHTML="Pilih file dulu";
return;
}

let reader=new FileReader();

reader.onload=function(e){

fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({
action:"uploadBukuPB",
nama_pengguna:namaPengguna,
nama_buku:buku,
folder_id:folderId,
tahun:tahunAjaran,
fileName:file.name,
mimeType:file.type,
base64:e.target.result
})
})
.then(r=>r.json())
.then(res=>{
status.innerHTML="✔ Upload berhasil";
document.getElementById("btn"+i).disabled=true;
document.getElementById("btn"+i).innerText="✔ Sudah Upload";
});
};

reader.readAsDataURL(file);
}

</script>

</body>
</html>
