<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Admin Panel APASE WEB</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(
135deg,
#0f172a,
#1e3a8a,
#2563eb
);

padding:30px;

overflow-x:hidden;

color:white;

}

/* CONTAINER */

.container{

max-width:1400px;

margin:auto;

}

/* HEADER */

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:35px;

flex-wrap:wrap;

gap:20px;

}

.header h1{

font-size:38px;

font-weight:700;

}

.logout-btn{

padding:12px 22px;

border:none;

border-radius:14px;

background:#ef4444;

color:white;

font-weight:600;

cursor:pointer;

transition:.3s;

}

.logout-btn:hover{

background:#dc2626;

transform:translateY(-2px);

}

/* MENU */

.menu-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:30px;

margin-bottom:35px;

}

.menu-card{

background:
rgba(255,255,255,0.12);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.18);

border-radius:30px;

padding:35px 25px;

text-align:center;

cursor:pointer;

transition:.3s;

box-shadow:
0 10px 30px rgba(0,0,0,0.2);

}

.menu-card:hover{

transform:translateY(-10px);

background:
rgba(255,255,255,0.18);

}

.menu-icon{

width:120px;
height:120px;

margin:auto auto 20px;

border-radius:30px;

background:
rgba(255,255,255,0.15);

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

}

.menu-icon img{

width:70%;
height:70%;

object-fit:contain;

}

.menu-title{

font-size:20px;

font-weight:600;

}

/* GURU BOX */

.guru-box{

width:100%;

margin-bottom:35px;

padding:25px 30px;

border-radius:30px;

background:
linear-gradient(
135deg,
#f59e0b,
#ea580c,
#dc2626
);

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:20px;

box-shadow:
0 12px 30px rgba(0,0,0,0.25);

}

.guru-title{

font-size:28px;

font-weight:700;

letter-spacing:1px;

}

.upload-btn{

padding:14px 24px;

border:none;

border-radius:16px;

background:white;

color:#dc2626;

font-weight:700;

cursor:pointer;

transition:.3s;

}

.upload-btn:hover{

transform:translateY(-2px);

background:#fff7ed;

}

/* TABLE */

.table-container{

background:
rgba(255,255,255,0.12);

backdrop-filter:blur(20px);

border:
2px solid black;

border-radius:30px;

padding:25px;

overflow-x:auto;

margin-bottom:35px;

}

.table-title{

font-size:24px;

margin-bottom:20px;

font-weight:600;

}

table{

width:100%;

border-collapse:collapse;

border:2px solid black;

}

th,
td{

padding:15px;

text-align:left;

border:
1px solid black;

font-size:14px;

}

th{

background:
rgba(255,255,255,0.1);

}

/* MODAL */

.modal{

display:none;

position:fixed;

z-index:999;

left:0;
top:0;

width:100%;
height:100%;

overflow:auto;

background:
rgba(0,0,0,0.6);

padding:30px;

}

.modal-content{

background:#1e293b;

border-radius:30px;

max-width:1000px;

margin:auto;

padding:35px;

animation:fadeIn .3s ease;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(-20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.close{

float:right;

font-size:28px;

cursor:pointer;

}

.form-title{

font-size:28px;

margin-bottom:25px;

font-weight:700;

}

.form-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:18px;

}

.input-group{

display:flex;

flex-direction:column;

}

.input-group label{

margin-bottom:8px;

font-size:14px;

}

.input-group input{

padding:14px;

border:none;

border-radius:14px;

outline:none;

background:
rgba(255,255,255,0.1);

color:white;

}

.save-btn{

width:100%;

margin-top:25px;

padding:15px;

border:none;

border-radius:16px;

background:white;

color:#1e3a8a;

font-size:16px;

font-weight:700;

cursor:pointer;

transition:.3s;

}

.save-btn:hover{

background:#dbeafe;

transform:translateY(-2px);

}

/* LOADING */

.loading-animation{

opacity:0.8;

pointer-events:none;

}

.loading-dots::after{

content:'';

animation:dots 1.5s infinite;

}

@keyframes dots{

0%{
content:'';
}

25%{
content:'.';
}

50%{
content:'..';
}

75%{
content:'...';
}

100%{
content:'';
}

}

#uploadStatus{

margin-top:20px;

text-align:center;

font-size:14px;

font-weight:600;

line-height:1.8;

}

.action-btn{

border:none;

padding:10px 14px;

border-radius:10px;

cursor:pointer;

font-weight:600;

color:white;

margin-right:5px;

}

.edit-btn{

background:#2563eb;

}

.delete-btn{

background:#dc2626;

}

.success-btn{

background:#16a34a !important;

}

@media(max-width:768px){

.header{

flex-direction:column;

align-items:flex-start;

}

.guru-box{

flex-direction:column;

align-items:flex-start;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>
ADMIN PANEL APASE WEB
</h1>

<button class="logout-btn"
        onclick="logout()">

Logout

</button>

</div>

<!-- MENU -->
<div class="menu-grid">

<div class="menu-card"
     onclick="openModal('profilModal')">

<div class="menu-icon">

<img src="assets/img/profil-sekolah.png">

</div>

<div class="menu-title">

Profil Sekolah

</div>

</div>

<div class="menu-card"
     onclick="openModal('akunModal')">

<div class="menu-icon">

<img src="assets/img/akun-pengguna.png">

</div>

<div class="menu-title">

Akun Pengguna

</div>

</div>

</div>

<!-- DATA GURU -->
<div class="guru-box">

<div class="guru-title">

DATA GURU DAN TENDIK

</div>

<button class="upload-btn"
        onclick="openModal('uploadModal')">

Unggah CSV

</button>

</div>

<!-- DATA PTK -->
<div class="table-container">

<div class="table-title">

DATA PTK

</div>

<table>

<thead>

<tr>

<th>NAMA</th>
<th>NIP / NRPTT / NRTS</th>
<th>TUGAS SEBAGAI</th>
<th>NUPTK</th>
<th>STATUS KEPEGAWAIAN</th>
<th>AKSI</th>

</tr>

</thead>

<tbody id="ptkTable">

</tbody>

</table>

</div>

<!-- DATA USER -->
<div class="table-container">

<div class="table-title">

Data Pengguna

</div>

<table>

<thead>

<tr>

<th>Nama Pengguna</th>
<th>Username</th>
<th>Password</th>
<th>Email</th>

</tr>

</thead>

<tbody id="userTable">

</tbody>

</table>

</div>

</div>

<!-- MODAL EDIT PTK -->
<div class="modal"
     id="editPTKModal">

<div class="modal-content">

<span class="close"
      onclick="closeModal('editPTKModal')">

&times;

</span>

<div class="form-title">

Edit Data PTK

</div>

<div id="editPTKContent">

</div>

</div>

</div>

<script>

// API URL
const API_URL =
"https://script.google.com/macros/s/AKfycbwo6yEkwQebM4ImabaLk7IWZx7z8l1vGkVOzJw1SlhgW8kwbL7_THG4LzmZfyvBemoo/exec";

// API PTK
const PTK_API =
"https://script.google.com/macros/s/AKfycbydbCQVMuU59haYmboDhQXHmac8J9PqnXLQEsUmn24ZY7OOuGscucigcLEZBLmbw8IJ/exec";

// LOGIN
const loginUser =
localStorage.getItem("loginUser");

if(!loginUser){

window.location.href =
"index.html";

}

// LOGOUT
function logout(){

localStorage.removeItem(
"loginUser"
);

window.location.href =
"index.html";

}

// MODAL
function openModal(id){

document.getElementById(id)
.style.display = "block";

}

function closeModal(id){

document.getElementById(id)
.style.display = "none";

}

// LOAD USERS
async function loadUsers(){

const response =
await fetch(
`${API_URL}?action=getUsers`
);

const result =
await response.json();

let html = "";

result.data.forEach(user => {

html += `

<tr>

<td>${user.nama}</td>
<td>${user.username}</td>
<td>${user.password}</td>
<td>${user.email}</td>

</tr>

`;

});

document.getElementById(
"userTable"
).innerHTML = html;

}

// LOAD PTK
async function loadPTK(){

try{

const response =
await fetch(PTK_API);

const result =
await response.json();

window.allPTK =
result.data;

let html = "";

result.data.forEach((ptk,index)=>{

html += `

<tr>

<td>${ptk.nama}</td>
<td>${ptk.nip}</td>
<td>${ptk.tugas}</td>
<td>${ptk.nuptk}</td>
<td>${ptk.status}</td>

<td>

<button
class="action-btn edit-btn"
onclick="editPTK(${index})">

Edit

</button>

<button
class="action-btn delete-btn"
onclick="hapusPTK(${index})">

Hapus

</button>

</td>

</tr>

`;

});

document.getElementById(
"ptkTable"
).innerHTML = html;

}

catch(error){

console.log(error);

}

}

// EDIT PTK
function editPTK(index){

const data =
window.allPTK[index];

let html = `

<div class="form-grid">

${buatField("Nama",data.nama,"nama")}
${buatField("NIP",data.nip,"nip")}
${buatField("Tempat Lahir",data.tempat_lahir,"tempat")}
${buatField("Tanggal Lahir",data.tanggal_lahir,"tanggal")}
${buatField("Pangkat",data.pangkat,"pangkat")}
${buatField("Pendidikan",data.pendidikan,"pendidikan")}
${buatField("Tugas",data.tugas,"tugas")}
${buatField("Mulai",data.mulai,"mulai")}
${buatField("NUPTK",data.nuptk,"nuptk")}
${buatField("Alamat",data.alamat,"alamat")}
${buatField("Status",data.status,"status")}

</div>

`;

document.getElementById(
"editPTKContent"
).innerHTML = html;

openModal(
"editPTKModal"
);

}

// FIELD
function buatField(label,value,id){

return `

<div class="input-group">

<label>
${label}
</label>

<div style="
background:rgba(255,255,255,0.08);
padding:12px;
border-radius:12px;
margin-bottom:10px;
">

${value || "-"}

</div>

<input type="text"
       id="${id}"
       placeholder="Data baru">

<button
class="action-btn edit-btn"
id="btn_${id}"
onclick="ubahField('${id}')">

Ubah

</button>

</div>

`;

}

// UBAH FIELD
function ubahField(id){

const btn =
document.getElementById(
"btn_" + id
);

btn.classList.remove(
"edit-btn"
);

btn.classList.add(
"success-btn"
);

btn.innerHTML =
"Berhasil Diubah";

}

// HAPUS
function hapusPTK(index){

const yakin =
confirm(
"Yakin ingin menghapus data PTK?"
);

if(!yakin) return;

window.allPTK.splice(index,1);

loadPTK();

alert(
"Data berhasil dihapus"
);

}

// INIT
loadUsers();
loadPTK();

</script>

</body>
</html>
