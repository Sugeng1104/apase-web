<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Data Peserta Didik</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(
135deg,
#0f172a,
#1e3a8a,
#2563eb
);

min-height:100vh;

padding:30px;

color:white;

overflow-x:auto;

}

.container{

max-width:1700px;

margin:auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

flex-wrap:wrap;

gap:20px;

}

.title{

font-size:36px;

font-weight:700;

}

.search-box{

display:flex;

gap:15px;

flex-wrap:wrap;

}

.search-box input,
.search-box select{

padding:14px 18px;

border:none;

border-radius:14px;

outline:none;

font-size:14px;

min-width:220px;

}

.table-container{

background:
rgba(255,255,255,0.12);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.18);

border-radius:30px;

padding:25px;

overflow:auto;

box-shadow:
0 10px 30px rgba(0,0,0,0.2);

position:relative;

}

.table-title{

font-size:24px;

font-weight:600;

margin-bottom:20px;

}

table{

width:100%;

border-collapse:collapse;

min-width:1500px;

}

th,
td{

padding:14px;

text-align:left;

border-bottom:
1px solid rgba(255,255,255,0.1);

font-size:14px;

}

th{

background:
rgba(255,255,255,0.12);

font-weight:600;

}

tr:hover{

background:
rgba(255,255,255,0.06);

}

.loading{

text-align:center;

padding:30px;

font-size:16px;

}

/* BUTTON KEMBALI */

.back-container{

display:flex;

justify-content:flex-end;

margin-top:25px;

}

.back-btn{

padding:14px 26px;

border:none;

border-radius:16px;

background:#facc15;

color:#111827;

font-weight:700;

font-size:15px;

cursor:pointer;

transition:.3s;

text-decoration:none;

display:inline-block;

}

.back-btn:hover{

background:#fde047;

transform:translateY(-2px);

}

/* RESPONSIVE */

@media(max-width:768px){

.title{

font-size:28px;

}

.search-box{

width:100%;

}

.search-box input,
.search-box select{

width:100%;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title">
DATA PESERTA DIDIK
</div>

<div class="search-box">

<input type="text"
       id="searchInput"
       placeholder="Cari nama siswa...">

<select id="filterKelas">

<option value="">
Semua Kelas
</option>

</select>

</div>

</div>

<div class="table-container">

<div class="table-title">

Daftar Peserta Didik

</div>

<div id="loading"
     class="loading">

Memuat data siswa...

</div>

<table>

<thead>

<tr>

<th>No</th>
<th>NIS</th>
<th>NISN</th>
<th>Nama Murid</th>
<th>L/P</th>
<th>Kelas</th>
<th>Tempat Lahir</th>
<th>Tgl Lahir</th>
<th>Ayah</th>
<th>Ibu</th>
<th>Asal Sekolah (TK)</th>

</tr>

</thead>

<tbody id="siswaTable">

</tbody>

</table>

<!-- BUTTON KEMBALI -->

<div class="back-container">

<a href="https://sugeng1104.github.io/apase-web/dashboard.html"
   class="back-btn">

Kembali

</a>

</div>

</div>

</div>

<script>

// =====================================
// URL WEB APP APPS SCRIPT
// =====================================

const API_URL =
"https://script.google.com/macros/s/AKfycbwo6yEkwQebM4ImabaLk7IWZx7z8l1vGkVOzJw1SlhgW8kwbL7_THG4LzmZfyvBemoo/exec";

// =====================================
// DATA GLOBAL
// =====================================

let siswaData = [];

// =====================================
// LOAD DATA SISWA
// =====================================

async function loadSiswa(){

try{

const response =
await fetch(
`${API_URL}?action=getPesertaDidik`
);

const result =
await response.json();

document.getElementById(
"loading"
).style.display = "none";

if(result.status === "success"){

siswaData =
result.data;

renderTable(
siswaData
);

loadFilterKelas();

}
else{

alert(
"Gagal memuat data siswa"
);

}

}
catch(error){

console.log(error);

alert(
"Gagal koneksi ke server"
);

}

}

// =====================================
// RENDER TABLE
// =====================================

function renderTable(data){

let html = "";

data.forEach((item,index)=>{

html += `

<tr>

<td>${index + 1}</td>
<td>${item.nis || ""}</td>
<td>${item.nisn || ""}</td>
<td>${item.nama || ""}</td>
<td>${item.lp || ""}</td>
<td>${item.kelas || ""}</td>
<td>${item.tempat_lahir || ""}</td>
<td>${item.tgl_lahir || ""}</td>
<td>${item.ayah || ""}</td>
<td>${item.ibu || ""}</td>
<td>${item.asal_tk || ""}</td>

</tr>

`;

});

document.getElementById(
"siswaTable"
).innerHTML = html;

}

// =====================================
// FILTER KELAS
// =====================================

function loadFilterKelas(){

const kelasSet =
new Set();

siswaData.forEach(item => {

if(item.kelas){

kelasSet.add(item.kelas);

}

});

let html =
'<option value="">Semua Kelas</option>';

[...kelasSet]
.sort()
.forEach(kelas => {

html += `

<option value="${kelas}">
${kelas}
</option>

`;

});

document.getElementById(
"filterKelas"
).innerHTML = html;

}

// =====================================
// SEARCH
// =====================================

document.getElementById(
"searchInput"
).addEventListener(
"keyup",
filterData
);

// =====================================
// FILTER KELAS
// =====================================

document.getElementById(
"filterKelas"
).addEventListener(
"change",
filterData
);

// =====================================
// FILTER DATA
// =====================================

function filterData(){

const keyword =
document.getElementById(
"searchInput"
).value.toLowerCase();

const kelas =
document.getElementById(
"filterKelas"
).value;

const filtered =
siswaData.filter(item => {

const cocokNama =
(item.nama || "")
.toLowerCase()
.includes(keyword);

const cocokKelas =
kelas === "" ||
item.kelas === kelas;

return cocokNama &&
cocokKelas;

});

renderTable(filtered);

}

// =====================================
// INIT
// =====================================

loadSiswa();

</script>

</body>
</html>
