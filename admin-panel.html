<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Panel APASE WEB</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<!-- TABULATOR -->
<link href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css"
rel="stylesheet">

<script src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(
135deg,
#0f172a,
#1e3a8a,
#2563eb
);

padding:30px;

overflow-x:hidden;

color:white;

}

/* CONTAINER */

.container{

max-width:1500px;

margin:auto;

}

/* HEADER */

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:35px;

flex-wrap:wrap;

gap:20px;

}

.header h1{

font-size:38px;

font-weight:700;

}

.logout-btn{

padding:12px 22px;

border:none;

border-radius:14px;

background:#ef4444;

color:white;

font-weight:600;

cursor:pointer;

transition:.3s;

}

.logout-btn:hover{

background:#dc2626;

transform:translateY(-2px);

}

/* BOX */

.guru-box{

width:100%;

margin-bottom:35px;

padding:25px 30px;

border-radius:30px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:20px;

box-shadow:
0 12px 30px rgba(0,0,0,0.25);

}

/* ORANGE */

.orange-box{

background:
linear-gradient(
135deg,
#f59e0b,
#ea580c,
#dc2626
);

}

/* BLUE */

.blue-box{

background:
linear-gradient(
135deg,
#2563eb,
#1d4ed8,
#1e40af
);

}

.guru-title{

font-size:28px;

font-weight:700;

letter-spacing:1px;

}

.upload-btn{

padding:14px 24px;

border:none;

border-radius:16px;

background:white;

font-weight:700;

cursor:pointer;

transition:.3s;

}

.upload-btn:hover{

transform:translateY(-2px);

}

/* TABLE */

.table-container{

background:
rgba(255,255,255,0.12);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.18);

border-radius:30px;

padding:25px;

overflow-x:auto;

margin-bottom:35px;

}

.table-title{

font-size:24px;

margin-bottom:20px;

font-weight:600;

}

table{

width:100%;

border-collapse:collapse;

background:white;

border-radius:20px;

overflow:hidden;

}

th{

background:#facc15;

color:#1e293b;

padding:15px;

text-align:left;

font-size:14px;

border:2px solid black;

}

td{

padding:14px;

font-size:14px;

color:#1e293b;

border:2px solid black;

}

tr:hover{

background:#f8fafc;

}

/* BUTTON */

.action-btn{

padding:8px 14px;

border:none;

border-radius:10px;

font-size:13px;

font-weight:700;

cursor:pointer;

margin-right:8px;

}

.edit-btn{

background:#2563eb;

color:white;

}

.delete-btn{

background:#dc2626;

color:white;

}

/* MODAL */

.modal{

display:none;

position:fixed;

z-index:999;

left:0;
top:0;

width:100%;
height:100%;

overflow:auto;

background:
rgba(0,0,0,0.7);

padding:30px;

}

.modal-content{

background:#1e293b;

border-radius:30px;

max-width:95%;

margin:auto;

padding:35px;

animation:fadeIn .3s ease;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(-20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.close{

float:right;

font-size:30px;

cursor:pointer;

color:white;

}

/* TABULATOR */

.tabulator{

font-size:13px;

border-radius:16px;

overflow:hidden;

}

.tabulator .tabulator-header{

background:#facc15;

color:#1e293b;

font-weight:700;

}

.tabulator .tabulator-col{

border-right:1px solid black;

}

.tabulator-row{

border-bottom:1px solid black;

}

.tabulator-cell{

border-right:1px solid black;

}

/* TOOLBAR */

.toolbar{

display:flex;

gap:15px;

flex-wrap:wrap;

margin-bottom:20px;

}

.toolbar button{

padding:12px 20px;

border:none;

border-radius:12px;

font-weight:700;

cursor:pointer;

color:white;

}

.btn-green{

background:#16a34a;

}

.btn-blue{

background:#2563eb;

}

.btn-red{

background:#dc2626;

}

.btn-yellow{

background:#f59e0b;

}

/* RESPONSIVE */

@media(max-width:768px){

.header{

flex-direction:column;

align-items:flex-start;

}

.guru-box{

flex-direction:column;

align-items:flex-start;

}

}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<h1>
ADMIN PANEL APASE WEB
</h1>

<button class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

<!-- DATA GURU -->

<div class="guru-box orange-box">

<div class="guru-title">

DATA GURU DAN TENDIK

</div>

<button class="upload-btn"
style="
color:#dc2626;
"
onclick="alert('Fitur Upload CSV')">

Unggah CSV

</button>

</div>

<!-- TABEL PTK -->

<div class="table-container">

<div class="table-title">

Daftar PTK

</div>

<table>

<thead>

<tr>

<th>NAMA</th>
<th>NIP / NRPTT / NRTS</th>
<th>PANGKAT / GOL.</th>
<th>TUGAS</th>
<th>NUPTK</th>
<th>STATUS</th>
<th>AKSI</th>

</tr>

</thead>

<tbody id="ptkTable">

<tr>

<td colspan="7">

Memuat data PTK...

</td>

</tr>

</tbody>

</table>

</div>

<!-- STATISTIK SISWA -->

<div class="guru-box blue-box">

<div class="guru-title">

STATISTIK SISWA

</div>

<button class="upload-btn"
style="
color:#1d4ed8;
"
onclick="openModal('siswaModal')">

Klik

</button>

</div>

<!-- MODAL SISWA -->

<div class="modal"
id="siswaModal">

<div class="modal-content">

<span class="close"
onclick="closeModal('siswaModal')">

&times;

</span>

<h2 style="
margin-bottom:25px;
">

DATA PESERTA DIDIK

</h2>

<!-- TOOLBAR -->

<div class="toolbar">

<button class="btn-green"
onclick="addRowSiswa()">

Tambah Baris

</button>

<button class="btn-blue"
onclick="saveAllSiswa()">

Simpan Semua

</button>

<button class="btn-red"
onclick="deleteSelectedSiswa()">

Hapus Dipilih

</button>

<button class="btn-yellow"
onclick="loadDataSiswaEditable()">

Refresh

</button>

</div>

<div style="
margin-bottom:20px;
line-height:1.8;
font-size:14px;
">

✅ Bisa copy paste langsung dari Excel  
✅ Klik cell untuk edit  
✅ Ctrl + V langsung bisa  
✅ Multi select hapus data  

</div>

<!-- TABLE EDITABLE -->

<div id="editableSiswaTable"
style="
background:white;
border-radius:16px;
overflow:hidden;
"></div>

</div>

</div>

</div>

<script>

// =====================================
// API
// =====================================

const PTK_API =
"https://script.google.com/macros/s/AKfycbydbCQVMuU59haYmboDhQXHmac8J9PqnXLQEsUmn24ZY7OOuGscucigcLEZBLmbw8IJ/exec";

const SISWA_API =
"https://script.google.com/macros/s/AKfycbzSOyQZ19w7IjuFIFmBqsFMvxC4bOifMXSxBR0UpwZ_Pdcsf8K39q_1Fv6z5VSUbD66GQ/exec";

// =====================================
// LOGIN
// =====================================

const loginUser =
localStorage.getItem("loginUser");

if(!loginUser){

window.location.href =
"index.html";

}

// =====================================
// LOGOUT
// =====================================

function logout(){

localStorage.removeItem(
"loginUser"
);

window.location.href =
"index.html";

}

// =====================================
// MODAL
// =====================================

function openModal(id){

document.getElementById(id)
.style.display = "block";

}

function closeModal(id){

document.getElementById(id)
.style.display = "none";

}

// =====================================
// LOAD PTK
// =====================================

async function loadPTK(){

try{

const response =
await fetch(
`${PTK_API}?action=getDataPTK`
);

const result =
await response.json();

let html = "";

result.data.forEach(item=>{

html += `

<tr>

<td>${item.nama}</td>
<td>${item.nip}</td>
<td>${item.pangkat}</td>
<td>${item.tugas}</td>
<td>${item.nuptk}</td>
<td>${item.status}</td>

<td>

<button class="action-btn edit-btn">

Edit

</button>

<button class="action-btn delete-btn">

Hapus

</button>

</td>

</tr>

`;

});

document.getElementById(
"ptkTable"
).innerHTML = html;

}

catch(error){

console.log(error);

document.getElementById(
"ptkTable"
).innerHTML = `

<tr>

<td colspan="7">

Gagal memuat data PTK

</td>

</tr>

`;

}

}

// =====================================
// TABULATOR SISWA
// =====================================

let siswaTable;

// =====================================
// LOAD SISWA
// =====================================

async function loadDataSiswaEditable(){

try{

const response =
await fetch(
`${SISWA_API}?action=getPesertaDidik`
);

const result =
await response.json();

siswaTable =
new Tabulator(
"#editableSiswaTable",
{

height:"600px",

layout:"fitDataStretch",

movableColumns:true,

selectable:true,

clipboard:true,

clipboardPasteAction:"replace",

data:result.data,

columns:[

{
formatter:"rowSelection",
titleFormatter:"rowSelection",
hozAlign:"center",
width:50
},

{
title:"No",
field:"no",
editor:"input"
},

{
title:"NIS",
field:"nis",
editor:"input"
},

{
title:"NISN",
field:"nisn",
editor:"input"
},

{
title:"Nama Murid",
field:"nama",
editor:"input",
width:220
},

{
title:"L/P",
field:"lp",
editor:"input"
},

{
title:"Kelas",
field:"kelas",
editor:"input"
},

{
title:"Tempat Lahir",
field:"tempat_lahir",
editor:"input"
},

{
title:"Tanggal Lahir",
field:"tanggal_lahir",
editor:"input"
},

{
title:"Nomor KK",
field:"nomor_kk",
editor:"input"
},

{
title:"Tgl Terbit",
field:"tgl_terbit",
editor:"input"
},

{
title:"Ayah",
field:"ayah",
editor:"input"
},

{
title:"Ibu",
field:"ibu",
editor:"input"
},

{
title:"Pekerjaan OT",
field:"pekerjaan",
editor:"input"
},

{
title:"Alamat",
field:"alamat",
editor:"input"
},

{
title:"Desa",
field:"desa",
editor:"input"
},

{
title:"Kecamatan",
field:"kecamatan",
editor:"input"
},

{
title:"Kabupaten",
field:"kabupaten",
editor:"input"
},

{
title:"Provinsi",
field:"provinsi",
editor:"input"
},

{
title:"No KIS",
field:"kis",
editor:"input"
},

{
title:"KPS",
field:"kps",
editor:"input"
},

{
title:"KIP",
field:"kip",
editor:"input"
},

{
title:"KKS",
field:"kks",
editor:"input"
},

{
title:"PKH",
field:"pkh",
editor:"input"
},

{
title:"Asal TK",
field:"asal_tk",
editor:"input"
}

]

});

}

catch(error){

console.log(error);

alert(
"Gagal memuat data siswa"
);

}

}

// =====================================
// ADD ROW
// =====================================

function addRowSiswa(){

siswaTable.addRow({});

}

// =====================================
// DELETE
// =====================================

function deleteSelectedSiswa(){

const rows =
siswaTable.getSelectedRows();

if(rows.length === 0){

alert(
"Pilih data terlebih dahulu"
);

return;

}

if(confirm(
`Hapus ${rows.length} data?`
)){

rows.forEach(row=>{

row.delete();

});

}

}

// =====================================
// SAVE
// =====================================

async function saveAllSiswa(){

try{

const data =
siswaTable.getData();

const response =
await fetch(SISWA_API,{

method:"POST",

headers:{
"Content-Type":"text/plain;charset=utf-8"
},

body:JSON.stringify({

action:"replaceAllSiswa",

data:data

})

});

const result =
await response.json();

alert(result.message);

}

catch(error){

console.log(error);

alert(
"Gagal menyimpan data"
);

}

}

// =====================================
// INIT
// =====================================

loadPTK();

loadDataSiswaEditable();

</script>

</body>
</html>
