<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PB Panditan 1</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
min-height:100vh;
padding:30px;
color:white;
overflow-x:hidden;
}

/* USER */
.userbar{
background:rgba(255,255,255,0.12);
padding:10px 18px;
border-radius:14px;
margin-bottom:20px;
font-weight:600;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:35px;
flex-wrap:wrap;
gap:20px;
}

.title-box h1{font-size:38px;}
.title-box p{opacity:.8;font-size:15px;}

/* BACK */
.back-btn{
padding:12px 22px;
background:#facc15;
color:#1e293b;
border:none;
border-radius:14px;
font-weight:700;
cursor:pointer;
transition:.3s;
}
.back-btn:hover{transform:translateY(-2px);}

/* CARD */
.card{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.18);
border-radius:30px;
padding:30px;
display:grid;
grid-template-columns:320px 1fr;
gap:30px;
}

/* IMAGE */
.image-box img{
width:100%;
max-width:300px;
border-radius:24px;
}

/* MENU */
.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

/* BUTTON ANIM */
.menu-btn{
padding:18px;
border:none;
border-radius:20px;
background:rgba(255,255,255,0.15);
color:white;
font-weight:600;
cursor:pointer;
text-align:left;
opacity:0;
transform:translateY(20px);
animation:fadeIn .4s forwards;
}

.menu-btn:hover{
background:rgba(255,255,255,0.25);
transform:translateY(-4px);
}

@keyframes fadeIn{
to{opacity:1;transform:translateY(0);}
}

/* POPUP FIX SCROLL */
.popup{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
padding:20px;
overflow-y:auto;
}

.popup-content{
background:#1e293b;
padding:30px;
border-radius:25px;
width:100%;
max-width:700px;
max-height:90vh;
overflow-y:auto;
animation:pop .25s ease;
}

@keyframes pop{
from{transform:scale(.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

/* FOLDER */
.folder-btn{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#22c55e;
color:white;
font-weight:700;
cursor:pointer;
margin-bottom:15px;
transition:.3s;
}

.folder-btn:disabled{
opacity:0.6;
cursor:not-allowed;
}

/* STATUS */
.folder-status{
text-align:center;
color:#facc15;
margin-bottom:15px;
font-weight:600;
}

/* UPLOAD */
.upload-item{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:15px;
margin-bottom:12px;
}

.upload-btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.upload-btn:hover{
background:#1d4ed8;
}

.status-text{
font-size:13px;
margin-top:8px;
color:#facc15;
}

.close-btn{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#ef4444;
color:white;
font-weight:700;
cursor:pointer;
}

</style>
</head>

<body>

<div class="userbar">
👤 Login: <span id="namaUser">Loading...</span>
</div>

<div class="header">
<div class="title-box">
<h1>PB PANDITAN 1</h1>
<p>Pusat Buku dan Administrasi Guru</p>
</div>

<button class="back-btn" onclick="window.location.href='dashboard.html'">
Kembali
</button>
</div>

<div class="card">

<div class="image-box">
<img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f">
</div>

<div class="menu-grid">

<button class="menu-btn">📘 Buku Agama</button>
<button class="menu-btn">📗 Buku Bahasa Indonesia</button>
<button class="menu-btn">📕 Buku Pancasila</button>
<button class="menu-btn">📙 Buku Matematika</button>
<button class="menu-btn">📘 Buku IPAS</button>
<button class="menu-btn">📗 Buku Bahasa Inggris</button>
<button class="menu-btn">🎨 Buku Kesenian</button>
<button class="menu-btn">📕 Buku Bahasa Jawa</button>
<button class="menu-btn">📙 Buku BTQ</button>
<button class="menu-btn">📂 Modul Ajar</button>
<button class="menu-btn">📊 Nilai Siswa</button>
<button class="menu-btn">📝 Jurnal Harian</button>
<button class="menu-btn">📚 Buku BK</button>

<button class="menu-btn" onclick="openPopup()">⬆️ Unggah Berkas</button>

</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">

<div class="popup-content">

<h2 style="text-align:center;">Upload Berkas</h2>

<button class="folder-btn" id="btnFolder" onclick="buatFolder()">
📁 Buat Folder Saya
</button>

<div class="folder-status" id="status">
Cek status folder...
</div>

<div id="uploadArea"></div>

<button class="close-btn" onclick="tutup()">Tutup</button>

</div>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwo6yEkwQebM4ImabaLk7IWZx7z8l1vGkVOzJw1SlhgW8kwbL7_THG4LzmZfyvBemoo/exec";

/* LOGIN */
const loginUser=localStorage.getItem("loginUser");
const namaPengguna=localStorage.getItem("namaPengguna")||loginUser;

document.getElementById("namaUser").innerText=namaPengguna||"Guest";

let folderId="";

const daftarBuku=[
"Buku Agama","Buku Bahasa Indonesia","Buku Pancasila","Buku Matematika",
"Buku IPAS","Buku Bahasa Inggris","Buku Kesenian","Buku Bahasa Jawa",
"Buku BTQ","Modul Ajar","Nilai Siswa","Jurnal Harian","Buku BK"
];

function openPopup(){
document.getElementById("popup").style.display="flex";
cekStatusPB(); // 🔥 AUTO DETECT
}

function tutup(){
document.getElementById("popup").style.display="none";
}

/* 🔥 CEK STATUS DARI SHEET */
async function cekStatusPB(){

const res = await fetch(API_URL + "?action=checkFolderPB&nama_pengguna=" + namaPengguna);
const data = await res.json();

if(data.exists){

folderId = data.folderId;

document.getElementById("status").innerText =
"✅ Folder sudah tersedia";

document.getElementById("btnFolder").style.display="none";

renderUpload();

}else{

document.getElementById("status").innerText =
"📁 Folder belum dibuat";

document.getElementById("btnFolder").style.display="block";
}

}

/* CREATE FOLDER */
async function buatFolder(){

const status=document.getElementById("status");
const btn=document.getElementById("btnFolder");

status.innerText="⏳ Membuat folder...";
btn.disabled=true;

const res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"createFolderPB",
nama_pengguna:namaPengguna
})
});

const data=await res.json();

if(data.status==="success"){

folderId=data.folderId;

status.innerText="✅ Folder siap";

btn.style.display="none";

renderUpload();

}

}

/* RENDER UPLOAD */
function renderUpload(){

const el=document.getElementById("uploadArea");
el.innerHTML="";

daftarBuku.forEach((b,i)=>{

el.innerHTML+=`
<div class="upload-item">
<div><b>${b}</b></div>
<input type="file" id="f${i}">
<button class="upload-btn" onclick="upload(${i},'${b}')">Upload</button>
<div class="status-text" id="s${i}"></div>
</div>
`;

});

}

/* UPLOAD */
function upload(i,buku){

const file=document.getElementById("f"+i).files[0];
const status=document.getElementById("s"+i);

if(!file){
status.innerText="❌ pilih file";
return;
}

const reader=new FileReader();

reader.onload=e=>{

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"uploadBukuPB",
nama_pengguna:namaPengguna,
nama_buku:buku,
folder_id:folderId,
fileName:file.name,
mimeType:file.type,
base64:e.target.result
})
});

status.innerText="✅ uploaded";
};

reader.readAsDataURL(file);
}

</script>

</body>
</html>
