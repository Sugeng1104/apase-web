<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil Kepala Sekolah - APASE WEB</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background: linear-gradient(135deg, #052e16, #14532d, #16a34a);
      padding: 40px 20px;
      overflow-x:hidden;
      position:relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ========================= */
    /* GLOW BACKGROUND EFFECT */
    /* ========================= */
    .blur-circle {
      position: fixed;
      border-radius: 50%;
      filter: blur(150px);
      opacity: .25;
      z-index: 0;
    }
    .blur-1 { width: 400px; height: 400px; background: #4ade80; top: -100px; left: -100px; }
    .blur-2 { width: 400px; height: 400px; background: #22c55e; bottom: -100px; right: -100px; }

    /* ========================= */
    /* MAIN CONTAINER */
    /* ========================= */
    .container{
      position:relative;
      z-index:2;
      width: 100%;
      max-width: 900px;
      margin: auto;
    }

    /* ========================= */
    /* MAIN GLASS CARD */
    /* ========================= */
    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 30px;
      padding: 45px 35px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    /* ========================= */
    /* FOTO & HEADER PROFILE */
    /* ========================= */
    .foto-box {
      text-align: center;
      margin-bottom: 10px;
    }

    .avatar-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }

    .avatar-wrapper::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 50%;
      box-shadow: 0 0 25px rgba(74, 222, 128, 0.5);
      animation: pulse 2s infinite;
    }

    .foto-box img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
      background: white;
      padding: 6px;
      position: relative;
      z-index: 2;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .title {
      font-size: 30px;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .subtitle {
      font-size: 14px;
      color: #86efac;
      font-weight: 300;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* ========================= */
    /* DATA DISPLAY GRID */
    /* ========================= */
    .data-container {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .full-width {
      grid-column: span 2;
    }

    .data-item {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 20px 25px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: all 0.3s ease;
    }

    .data-item:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(74, 222, 128, 0.4);
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .icon-box {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #16a34a, #4ade80);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      flex-shrink: 0;
      box-shadow: 0 8px 15px rgba(22, 163, 74, 0.3);
    }

    .text-box {
      display: flex;
      flex-direction: column;
    }

    .label {
      font-size: 12px;
      text-transform: uppercase;
      color: #86efac;
      letter-spacing: 1px;
      margin-bottom: 2px;
      font-weight: 500;
    }

    .value {
      font-size: 16px;
      color: #ffffff;
      font-weight: 600;
      word-break: break-word;
    }

    /* ========================= */
    /* BUTTON ACTION */
    /* ========================= */
    .btn-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      margin-top: 40px;
      padding: 16px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #ffffff, #f0fdf4);
      color: #14532d;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .btn-back:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(74, 222, 128, 0.3);
      background: #ffffff;
    }

    /* ========================= */
    /* LOADING STATE */
    /* ========================= */
    .loading {
      text-align: center;
      color: #dcfce7;
      font-size: 18px;
      padding: 40px;
    }

    .loading i {
      font-size: 40px;
      color: #4ade80;
      margin-bottom: 15px;
    }

    /* ========================= */
    /* ANIMATIONS & RESPONSIVE */
    /* ========================= */
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.05); opacity: 0.2; }
      100% { transform: scale(1); opacity: 0.6; }
    }

    @media (max-width: 768px) {
      .data-container {
        grid-template-columns: 1fr;
      }
      .full-width {
        grid-column: span 1;
      }
      body {
        padding: 20px 10px;
      }
      .title {
        font-size: 24px;
      }
    }

  </style>

</head>

<body>

  <div class="blur-circle blur-1"></div>
  <div class="blur-circle blur-2"></div>

  <div class="container">

    <div class="card">

      <div class="foto-box">
        <div class="avatar-wrapper">
          <img src="assets/img/kepsek.png" alt="Foto Kepala Sekolah" onerror="this.src='https://placehold.co/150x150/white/14532d?text=KEPSEK'">
        </div>
        <div class="title" id="header_nama_kepsek">Profil Pimpinan</div>
        <div class="subtitle">SDN Panditan I</div>
      </div>

      <div class="loading" id="loading">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Menghubungkan ke Server Kepegawaian...</p>
      </div>

      <div class="data-container" id="dataContainer" style="display:none;">

        <div class="data-item">
          <div class="icon-box"><i class="fas fa-user-tie"></i></div>
          <div class="text-box">
            <span class="label">Nama Kepala Sekolah</span>
            <span class="value" id="nama">-</span>
          </div>
        </div>

        <div class="data-item">
          <div class="icon-box"><i class="fas fa-id-card"></i></div>
          <div class="text-box">
            <span class="label">NIP Resmi</span>
            <span class="value" id="nip">-</span>
          </div>
