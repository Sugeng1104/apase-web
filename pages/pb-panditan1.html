<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PB Panditan 1</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ====== TIDAK ADA YANG DIUBAH ====== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);min-height:100vh;padding:30px;overflow-x:hidden;color:white;}
.container{max-width:1400px;margin:auto;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:35px;flex-wrap:wrap;gap:20px;}
.user-login{background:rgba(255,255,255,0.15);padding:14px 22px;border-radius:18px;font-size:15px;font-weight:600;backdrop-filter:blur(12px);}
.title-box h1{font-size:38px;font-weight:700;margin-bottom:8px;}
.title-box p{opacity:.8;font-size:15px;}
.back-btn{padding:12px 22px;background:#facc15;color:#1e293b;border:none;border-radius:14px;font-weight:700;font-size:15px;cursor:pointer;}
.card{background:rgba(255,255,255,0.12);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.18);border-radius:30px;padding:30px;display:grid;grid-template-columns:320px 1fr;gap:30px;}
.image-box{display:flex;justify-content:center;}
.image-box img{width:100%;max-width:300px;border-radius:24px;object-fit:cover;}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;}
.menu-btn{padding:18px 20px;border:none;border-radius:20px;background:rgba(255,255,255,0.15);color:white;font-size:16px;font-weight:600;cursor:pointer;text-align:left;}
.popup{display:none;position:fixed;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:999;justify-content:center;align-items:center;}
.popup-content{background:#1e293b;padding:35px;border-radius:30px;max-width:700px;width:100%;text-align:center;}
.folder-btn{width:100%;padding:15px;border:none;border-radius:16px;background:#22c55e;color:white;font-weight:700;}
.folder-status{margin:20px 0;font-size:14px;color:#facc15;font-weight:600;}
.upload-item{margin-bottom:20px;padding:18px;background:rgba(255,255,255,0.08);border-radius:18px;text-align:left;}
.upload-btn{width:100%;padding:12px;border:none;border-radius:12px;background:#2563eb;color:white;font-weight:700;}
.upload-success{background:#16a34a !important;}
.status-text{margin-top:10px;font-size:14px;font-weight:600;}
</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="user-login" id="userLogin">👤 Memuat User...</div>

<div class="title-box">
<h1>PB PANDITAN 1</h1>
<p>Pusat Buku dan Administrasi Guru</p>
</div>

<button class="back-btn"
onclick="window.location.href='https://sugeng1104.github.io/apase-web/dashboard.html'">
Kembali
</button>

</div>

<div class="card">

<div class="image-box">
<img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=1200&auto=format&fit=crop">
</div>

<div class="menu-grid">

<button class="menu-btn">📘 Buku Agama</button>
<button class="menu-btn">📗 Buku Bahasa Indonesia</button>
<button class="menu-btn">📕 Buku Pancasila</button>
<button class="menu-btn">📙 Buku Matematika</button>
<button class="menu-btn">📘 Buku IPAS</button>
<button class="menu-btn">📗 Buku Inggris</button>
<button class="menu-btn">🎨 Buku Kesenian</button>
<button class="menu-btn">📂 Modul Ajar</button>

<button class="menu-btn" onclick="openUploadPopup()">⬆️ Unggah Berkas</button>

</div>
</div>

</div>

<!-- POPUP -->
<div class="popup" id="uploadPopup">
<div class="popup-content">

<h2>Unggah Berkas Guru</h2>

<button class="folder-btn" id="folderBtn" onclick="buatFolder()">📁 Buat Folder Saya</button>

<div class="folder-status" id="folderStatus">Folder belum dibuat</div>

<div id="uploadContainer" style="display:none;"></div>

</div>
</div>

<script>

// =========================
// API
// =========================
const API_URL = "https://script.google.com/macros/s/AKfycbwo6yEkwQebM4ImabaLk7IWZx7z8l1vGkVOzJw1SlhgW8kwbL7_THG4LzmZfyvBemoo/exec";

// =========================
// FIX LOGIN SESSION
// =========================
const usernameLogin =
localStorage.getItem("username") ||
localStorage.getItem("nama_pengguna") ||
sessionStorage.getItem("username") ||
"";

console.log("LOGIN DETECT:", usernameLogin);

let namaPengguna = "";
let folderId = "";

// =========================
// LOAD USER
// =========================
window.onload = async function () {

if (!usernameLogin || usernameLogin.trim() === "") {
document.getElementById("userLogin").innerHTML =
"❌ Session login tidak ditemukan (silakan login ulang)";
return;
}

try {

const res = await fetch(API_URL + "?action=getUsers");
const result = await res.json();

if (result.status === "success") {

const user = result.data.find(u => u.username === usernameLogin);

if (user) {
namaPengguna = user.nama;
document.getElementById("userLogin").innerHTML = "👤 " + namaPengguna;
} else {
document.getElementById("userLogin").innerHTML = "❌ User tidak ditemukan";
}

}

} catch (e) {
console.log(e);
document.getElementById("userLogin").innerHTML = "❌ Gagal memuat user";
}

};

// =========================
// POPUP
// =========================
function openUploadPopup() {
if (!namaPengguna) return alert("Login belum valid");
document.getElementById("uploadPopup").style.display = "flex";
}

// =========================
// CLOSE
// =========================
function closeUploadPopup() {
document.getElementById("uploadPopup").style.display = "none";
}

</script>

</body>
</html>
