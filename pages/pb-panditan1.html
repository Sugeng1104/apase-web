<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>PB Panditan 1</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(
135deg,
#0f172a,
#1e3a8a,
#2563eb
);

min-height:100vh;

padding:30px;

overflow-x:hidden;

color:white;

}

.container{

max-width:1400px;

margin:auto;

}

/* HEADER */

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:35px;

flex-wrap:wrap;

gap:20px;

}

.title-box h1{

font-size:38px;

font-weight:700;

margin-bottom:8px;

}

.title-box p{

opacity:.8;

font-size:15px;

}

/* BUTTON */

.back-btn{

padding:12px 22px;

background:#facc15;

color:#1e293b;

border:none;

border-radius:14px;

font-weight:700;

font-size:15px;

cursor:pointer;

transition:.3s;

box-shadow:
0 10px 20px rgba(0,0,0,0.2);

}

.back-btn:hover{

transform:translateY(-2px);

background:#fde047;

}

/* CARD */

.card{

background:
rgba(255,255,255,0.12);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.18);

border-radius:30px;

padding:30px;

display:grid;

grid-template-columns:
320px 1fr;

gap:30px;

box-shadow:
0 10px 35px rgba(0,0,0,0.25);

}

/* IMAGE */

.image-box{

display:flex;

justify-content:center;

align-items:flex-start;

}

.image-box img{

width:100%;

max-width:300px;

border-radius:24px;

object-fit:cover;

box-shadow:
0 10px 30px rgba(0,0,0,0.3);

}

/* MENU */

.menu-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:18px;

align-content:start;

}

.menu-btn{

padding:18px 20px;

border:none;

border-radius:20px;

background:
rgba(255,255,255,0.15);

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:.3s;

text-align:left;

box-shadow:
0 8px 20px rgba(0,0,0,0.15);

}

.menu-btn:hover{

transform:translateY(-4px);

background:
rgba(255,255,255,0.22);

}

/* POPUP */

.popup{

display:none;

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

background:
rgba(0,0,0,0.7);

z-index:999;

justify-content:center;

align-items:center;

padding:20px;

overflow:auto;

}

.popup-content{

background:#1e293b;

padding:35px;

border-radius:30px;

max-width:700px;

width:100%;

animation:popupShow .3s ease;

position:relative;

}

@keyframes popupShow{

from{
opacity:0;
transform:scale(.8);
}

to{
opacity:1;
transform:scale(1);
}

}

.popup-content h2{

margin-bottom:20px;

font-size:30px;

text-align:center;

}

/* BUTTON FOLDER */

.folder-btn{

width:100%;

padding:16px;

border:none;

border-radius:16px;

background:#22c55e;

color:white;

font-size:16px;

font-weight:700;

cursor:pointer;

margin-bottom:20px;

transition:.3s;

}

.folder-btn:hover{

background:#16a34a;

}

.folder-btn.disabled{

background:#64748b;

cursor:not-allowed;

}

/* STATUS */

.folder-status{

margin-bottom:25px;

font-size:15px;

font-weight:600;

line-height:1.8;

text-align:center;

color:#facc15;

}

/* UPLOAD */

.upload-container{

display:none;

}

.upload-item{

background:
rgba(255,255,255,0.08);

padding:20px;

border-radius:18px;

margin-bottom:18px;

}

.upload-title{

font-size:16px;

font-weight:700;

margin-bottom:12px;

}

.file-input{

width:100%;

padding:14px;

border:none;

border-radius:14px;

background:white;

margin-bottom:14px;

}

.upload-btn{

width:100%;

padding:14px;

border:none;

border-radius:14px;

background:#64748b;

color:white;

font-size:15px;

font-weight:700;

cursor:not-allowed;

transition:.3s;

}

.upload-btn.active{

background:#2563eb;

cursor:pointer;

}

.upload-btn.active:hover{

background:#1d4ed8;

}

.status-text{

margin-top:12px;

font-size:14px;

font-weight:600;

line-height:1.8;

}

/* CLOSE */

.close-btn{

margin-top:20px;

width:100%;

padding:14px;

border:none;

border-radius:14px;

background:#facc15;

color:#1e293b;

font-size:16px;

font-weight:700;

cursor:pointer;

transition:.3s;

}

.close-btn:hover{

background:#fde047;

}

@media(max-width:900px){

.card{

grid-template-columns:1fr;

}

.image-box{

justify-content:center;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title-box">

<h1>
PB PANDITAN 1
</h1>

<p>
Pusat Buku dan Administrasi Guru
</p>

</div>

<button class="back-btn"
onclick="window.location.href='dashboard.html'">

Kembali

</button>

</div>

<div class="card">

<div class="image-box">

<img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=1200&auto=format&fit=crop"
alt="Buku">

</div>

<div class="menu-grid">

<button class="menu-btn">📘 Buku Agama</button>
<button class="menu-btn">📗 Buku Bahasa Indonesia</button>
<button class="menu-btn">📕 Buku Pancasila</button>
<button class="menu-btn">📙 Buku Matematika</button>
<button class="menu-btn">📘 Buku IPAS</button>
<button class="menu-btn">📗 Buku Bahasa Inggris</button>
<button class="menu-btn">🎨 Buku Kesenian</button>
<button class="menu-btn">📕 Buku Bahasa Jawa</button>
<button class="menu-btn">📙 Buku BTQ</button>
<button class="menu-btn">📂 Modul Ajar</button>
<button class="menu-btn">📊 Nilai Siswa</button>
<button class="menu-btn">📝 Jurnal Harian</button>
<button class="menu-btn">📚 Buku BK</button>

<button class="menu-btn"
onclick="openUploadPopup()">

⬆️ Unggah Berkas

</button>

</div>

</div>

</div>

<!-- POPUP -->

<div class="popup"
id="uploadPopup">

<div class="popup-content">

<h2>
Unggah Berkas Guru
</h2>

<button class="folder-btn"
id="folderBtn"
onclick="buatFolder()">

📁 Buat Folder Saya

</button>

<div class="folder-status"
id="folderStatus">

Folder belum dibuat

</div>

<div class="upload-container"
id="uploadContainer">

</div>

<button class="close-btn"
onclick="closeUploadPopup()">

Tutup

</button>

</div>

</div>

<script>

// API URL
const API_URL =
"https://script.google.com/macros/s/AKfycbwo6yEkwQebM4ImabaLk7IWZx7z8l1vGkVOzJw1SlhgW8kwbL7_THG4LzmZfyvBemoo/exec";

// USER
const loginUser =
localStorage.getItem("loginUser") || "guru";

const namaPengguna =
localStorage.getItem("namaPengguna") || loginUser;

// FOLDER ID
let folderId = "";

// DAFTAR BUKU
const daftarBuku = [

"Buku Agama",
"Buku Bahasa Indonesia",
"Buku Pancasila",
"Buku Matematika",
"Buku IPAS",
"Buku Bahasa Inggris",
"Buku Kesenian",
"Buku Bahasa Jawa",
"Buku BTQ",
"Modul Ajar",
"Nilai Siswa",
"Jurnal Harian",
"Buku BK"

];

// OPEN POPUP
function openUploadPopup(){

document.getElementById(
"uploadPopup"
).style.display = "flex";

cekFolderSudahAda();

}

// CLOSE POPUP
function closeUploadPopup(){

document.getElementById(
"uploadPopup"
).style.display = "none";

}

// CEK STATUS FOLDER
function cekFolderSudahAda(){

const status =
document.getElementById(
"folderStatus"
);

const folderBtn =
document.getElementById(
"folderBtn"
);

// CEK LOCAL
const savedFolderId =
localStorage.getItem(
"folderIdPB"
);

if(savedFolderId){

folderId = savedFolderId;

folderBtn.disabled = true;

folderBtn.classList.add(
"disabled"
);

folderBtn.innerHTML =
"✅ Folder Sudah Dibuat";

status.innerHTML =
"<span style='color:#22c55e'>✅ Folder aktif dan siap digunakan</span>";

tampilkanFormUpload();

}

}

// BUAT FOLDER
async function buatFolder(){

const status =
document.getElementById(
"folderStatus"
);

const folderBtn =
document.getElementById(
"folderBtn"
);

status.innerHTML =
"⏳ Membuat folder...";

try{

const response =
await fetch(API_URL,{

method:"POST",

headers:{
"Content-Type":"text/plain;charset=utf-8"
},

body:JSON.stringify({

action:"createFolderPB",

nama_pengguna:namaPengguna

})

});

const result =
await response.json();

if(result.status === "success"){

folderId =
result.folderId;

// SIMPAN LOCAL
localStorage.setItem(
"folderIdPB",
folderId
);

status.innerHTML =
"<span style='color:#22c55e'>✅ Folder berhasil dibuat</span>";

folderBtn.disabled = true;

folderBtn.classList.add(
"disabled"
);

folderBtn.innerHTML =
"✅ Folder Sudah Dibuat";

tampilkanFormUpload();

}else{

status.innerHTML =
"❌ " + result.message;

}

}

catch(error){

status.innerHTML =
"❌ Gagal membuat folder";

console.log(error);

}

}

// FORM UPLOAD
function tampilkanFormUpload(){

const container =
document.getElementById(
"uploadContainer"
);

container.style.display =
"block";

container.innerHTML = "";

daftarBuku.forEach((namaBuku,index)=>{

container.innerHTML += `

<div class="upload-item">

<div class="upload-title">
${namaBuku}
</div>

<input type="file"
id="file${index}"
class="file-input">

<button
class="upload-btn"
id="btn${index}"
disabled
onclick="uploadFile(${index},'${namaBuku}')">

Kirim ${namaBuku}

</button>

<div
class="status-text"
id="status${index}">
</div>

</div>

`;

});

// AKTIFKAN TOMBOL
daftarBuku.forEach((_,index)=>{

document.getElementById(
`file${index}`
).addEventListener(
"change",
function(){

const btn =
document.getElementById(
`btn${index}`
);

if(this.files.length > 0){

btn.disabled = false;

btn.classList.add(
"active"
);

}else{

btn.disabled = true;

btn.classList.remove(
"active"
);

}

});

});

}

// UPLOAD FILE
async function uploadFile(index,namaBuku){

const fileInput =
document.getElementById(
`file${index}`
);

const status =
document.getElementById(
`status${index}`
);

const btn =
document.getElementById(
`btn${index}`
);

if(fileInput.files.length === 0){

status.innerHTML =
"❌ Pilih file";

return;

}

const file =
fileInput.files[0];

status.innerHTML =
"⏳ Membaca file...";

const reader =
new FileReader();

reader.onload =
async function(e){

try{

status.innerHTML =
"⏳ Mengupload file...";

const response =
await fetch(API_URL,{

method:"POST",

headers:{
"Content-Type":"text/plain;charset=utf-8"
},

body:JSON.stringify({

action:"uploadBukuPB",

folder_id:folderId,

nama_pengguna:namaPengguna,

nama_buku:namaBuku,

fileName:file.name,

mimeType:file.type,

base64:e.target.result

})

});

const result =
await response.json();

if(result.status === "success"){

status.innerHTML =
"<span style='color:#22c55e'>✅ Sudah Upload</span>";

fileInput.disabled = true;

btn.disabled = true;

btn.classList.remove(
"active"
);

btn.style.background =
"#22c55e";

btn.innerHTML =
"✅ Sudah Upload";

}else{

status.innerHTML =
"❌ " + result.message;

}

}

catch(error){

status.innerHTML =
"❌ Upload gagal";

console.log(error);

}

};

reader.readAsDataURL(file);

}

// CLOSE OUTSIDE
window.onclick = function(event){

const popup =
document.getElementById(
"uploadPopup"
);

if(event.target === popup){

popup.style.display =
"none";

}

}

</script>

</body>
</html>
